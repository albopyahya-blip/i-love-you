  margin:0;

  align-items:center;
  justify-content:center;
  min-height:100vh;
  color:var(--text-main);
  background-color:var(--bg-dark);
  transition:0.4s;
}

.level-screen{
  display:flex;
  flex-direction:column;
  gap:10px;
  align-items:center;
}

button{
  padding:12px 20px;
  border:none;
  border-radius:20px;
  font-weight:bold;
  cursor:pointer;
  background: var(--btn-main);
  color: var(--text-main);
}

.info{
  display:none;
  gap:10px;
  font-weight:bold;
  margin-bottom:10px;
  flex-wrap:wrap;
  justify-content:center;
}

.game{
  display:none;
  gap:10px;
  width:95%;
  max-width:600px;
  margin-top:10px;
  justify-content:center;
  flex-wrap:wrap;
}

/* الكارت */
.card{
  width:70px;
  height:70px;
  position:relative;
  transform-style:preserve-3d;
  transition:0.5s;
  cursor:pointer;
}

.card.flipped{
  transform:rotateY(180deg);
}

.card div{
  position:absolute;
  width:100%;
  height:100%;
  backface-visibility:hidden;
  border-radius:8px;
}

.front{
  background:white;
}

.back{
  transform:rotateY(180deg);
}

.back img{
  width:100%;
  height:100%;
  object-fit:cover;
  border-radius:8px;
}

/* رسالة منتصف الشاشة */
#matchMessage{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:var(--bg-side);
  color:var(--text-main);
  padding:20px 25px;
  border-radius:20px;
  font-weight:bold;
  font-size:16px;
  display:none;
  z-index:9999;
  box-shadow:0 15px 40px rgba(0,0,0,0.3);
  min-width:200px;
  text-align:center;
}

/* زرار الإغلاق */
#closeMessage{
  position:absolute;
  top:8px;
  right:10px;
  background:none;
  border:none;
  font-size:18px;
  cursor:pointer;
  color:var(--text-main);
}

.win{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:9999;
  text-align:center;
}

.win-text{
  color:white;
  font-size:40px;
  margin-bottom:20px;
}

.restart-btn{
  padding:14px 30px;
  border:none;
  border-radius:25px;
  font-weight:bold;
  cursor:pointer;
  background:#ff4d6d;
  color:white;
  font-size:18px;
}
</style>
</head>

function createBoard(){

  let pairs = level * 4; // ✅ التعديل هنا

  let selected=allImages
    .sort(()=>0.5-Math.random())
    .slice(0,pairs);

  let images=[...selected,...selected]
    .sort(()=>0.5-Math.random());

  images.forEach(src=>{
    const card=document.createElement("div");
    card.classList.add("card");

    card.innerHTML=`
      <div class="front"></div>
      <div class="back">
        <img src="${src}">
      </div>
    `;

    card.onclick=()=>flipCard(card);
    game.appendChild(card);
  });
}

function flipCard(card){
  if(lock || card.classList.contains("flipped")) return;

<style>
/* Switch Container أصغر */
.switch {
  font-size: 15px;
  position: fixed;
  top: 20px;
  right: 20px;
  display: inline-block;
  width: 3.2em;   /* أصغر شوي */
  height: 1.8em;  /* أصغر شوي */
  border-radius: 30px;
  box-shadow: 0 0 8px rgba(0,0,0,0.1);
  z-index: 2000;
}
.paper h1{
  margin-bottom:20px;
  font-size:20px; /* كان أكبر — دلوقتي أصغر */
  color:#ff4d6d;
}
.switch input {
  opacity: 0;
  width: 0;
  height: 0;
}

.slider {
  position: absolute;
  cursor: pointer;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background-color: var(--bg-side);
  transition: 0.4s;
  border-radius: 30px;
  overflow: hidden;
}

.slider:before {
  position: absolute;
  content: "";
  height: 1em;       /* أصغر شوي */
  width: 1em;        /* أصغر شوي */
  border-radius: 50%;
  left: 0.4em;
  bottom: 0.4em;
  transition: 0.4s cubic-bezier(0.81, -0.04, 0.38, 1.5);
  background-color: var(--btn-main);
  box-shadow: inset 6px -3px 0px 0px #fff;
}

.switch input:checked + .slider {
  background-color: var(--accent);
}

.switch input:checked + .slider:before {
  transform: translateX(1.4em);  /* تحريك أقل بسبب صغر الحجم */
  box-shadow: inset 12px -3px 0px 12px #ffcf48;
}
.back-btn-win{
  margin-top:10px;
  padding:10px 20px;
  border:none;
  border-radius:20px;
  background:#333;
  color:white;
  font-weight:bold;
  cursor:pointer;
  font-size:14px;
}
/* النجوم */
.star {
  background-color: #fff;
  border-radius: 50%;
  position: absolute;
  width: 4px;   /* أصغر شوي */
  height: 4px;  /* أصغر شوي */
  transition: all 0.4s;
}

.star_1 { left: 2em; top: 0.4em; }
.star_2 { left: 1.8em; top: 1em; }
.star_3 { left: 2.4em; top: 0.7em; }

.switch input:checked ~ .slider .star {
  opacity: 0;
}

/* السحابة */
.cloud {
  width: 2.8em;   /* أصغر شوي */
  position: absolute;
  bottom: -1em;
  left: -0.9em;
  opacity: 0;
  transition: all 0.4s;
}

.switch input:checked ~ .slider .cloud {
  opacity: 1;
}
</style>

<script>
const themeSwitch = document.getElementById('themeSwitch');
const html = document.documentElement;

// تحميل الوضع المحفوظ
const savedTheme = localStorage.getItem('theme');

if(savedTheme){
  html.setAttribute('data-theme', savedTheme);
  themeSwitch.checked = savedTheme === 'light';
}else{
  html.setAttribute('data-theme','dark');
  themeSwitch.checked = false;
}

themeSwitch.addEventListener('change', () => {

  if(themeSwitch.checked){
    html.setAttribute('data-theme','light');
    localStorage.setItem('theme','light');
  }else{
    html.setAttribute('data-theme','dark');
    localStorage.setItem('theme','dark');
  }

});
</script>
