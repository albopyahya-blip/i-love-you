/* ===== THEME VARIABLES ===== */
:root {
  --bg: #ffccd5;
  --text: #222222;

  --accent: #ff66aa;
}

/* ===== BASIC STYLE ===== */
body{

    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:var(--bg);
    color:var(--text);
    font-family:Arial, sans-serif;
    transition:0.3s ease;
}

.container{

}

#sentence{
    font-size:24px;

}

#timer{

}

/* ===== SWITCH ===== */
.switch {
  position: fixed;
  top: 20px;
  right: 20px;
  width: 50px;
  height: 28px;
}

.switch input {
  display:none;
}

.slider {
  position:absolute;
  cursor:pointer;
  top:0;
  left:0;
  right:0;
  bottom:0;
  background:#ccc;
  border-radius:30px;
  transition:0.3s;
}

.slider:before {
  content:"";
  position:absolute;
  height:20px;
  width:20px;
  left:4px;
  bottom:4px;
  background:white;
  border-radius:50%;
  transition:0.3s;
}

input:checked + .slider {
  background:var(--accent);
}

input:checked + .slider:before {
  transform:translateX(22px);
}
@keyframes blinkCursor {
  50% {
    border-right-color: transparent;
  }
}

@keyframes typeAndDelete {
  0%,
  10% {
    width: 0;
  }

  45%,
  55% {
    width: 5em;
  }

  90%,
  100% {
    width: 0;
  }
}

.terminal-loader {
  width: 100%;
  max-width: 400px;
  height: 200px;
  background: #1c1c1c;
  border: 1px solid #ffffff3e;
  border-radius: 10px;
  overflow: hidden;
  margin: 20px;
  box-shadow: 0 0 15px rgba(0, 0, 0, 0.4);
}
.terminal-loader{
  position: relative;
}

#timer{
  position: absolute;
  bottom: 10px;
  right: 15px;
  font-size: 13px;
  color: #ffffff;
}

.terminal-header {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  background-color: #343434;
  padding: 6px;
}

.terminal-controls {
  position: absolute;
  left: 10px;
  display: flex;
  gap: 7px;
}

.control {
  display: inline-block;
  width: 15px;
  height: 15px;
  border-radius: 50%;
  background-color: #777;
}

.control.close {
  background-color: #e33;
}

.control.minimize {
  background-color: #ee0;
}

.control.maximize {
  background-color: #0b0;
}

.terminal-title {
  color: #eeeeeec1;
}

.content {
  padding: 10px;
}
.text {
  display: block;              /* مهم */
  overflow: hidden;
  color: rgb(255, 255, 255);
  font-weight: 600;

  white-space: normal;         /* يسمح بالنزول لسطر جديد */
  word-wrap: break-word;       /* يكسر الكلمات الطويلة */

}
.text {

</style>

/* ===== CHANGE EVERY HOUR (STABLE) ===== */
function changeSentence(){
    const hour = new Date().getHours();
    const index = hour % sentences.length;

    document.getElementById("terminalText").textContent = sentences[index];
}

/* ===== TIMER ===== */
function updateTimer(){
    const now = new Date();

    const nextHour = new Date();
    nextHour.setHours(now.getHours() + 1, 0, 0, 0);

    const diff = nextHour - now;

    const minutes = Math.floor((diff % (1000*60*60)) / (1000*60));
    const seconds = Math.floor((diff % (1000*60)) / 1000);

    document.getElementById("timer").textContent =
        minutes + "m " + seconds + "s";
}

/* ===== AUTO UPDATE ===== */
changeSentence();
updateTimer();
setInterval(updateTimer, 1000);

function scheduleNextUpdate(){
    const now = new Date();
    const msUntilNextHour =
        (60 - now.getMinutes() - 1) * 60000 +
        (60 - now.getSeconds()) * 1000;

    setTimeout(() => {
        changeSentence();
        scheduleNextUpdate();
    }, msUntilNextHour);
}

scheduleNextUpdate();

const savedTheme = localStorage.getItem("theme");

    document.documentElement.setAttribute("data-theme", savedTheme);
    themeSwitch.checked = savedTheme === "dark";
}

themeSwitch.addEventListener("change", () => {
    const theme = themeSwitch.checked ? "dark" : "light";
    document.documentElement.setAttribute("data-theme", theme);
    localStorage.setItem("theme", theme);
});
