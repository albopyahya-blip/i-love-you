    <style>
        :root {
            --primary-color: #ff4d6d;
            --secondary-color: #ff8fa3;
            --glass-bg: rgba(255, 255, 255, 0.25);
            --glass-border: rgba(255, 255, 255, 0.5);
            --text-color: #590d22;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-color);
        }

        /* Ambient Background Animations */
        .bg-shapes {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .shape {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            animation: float 20s infinite linear;
        }

        .shape:nth-child(1) {
            width: 150px;
            height: 150px;
            top: 10%;
            left: 10%;
            animation-duration: 25s;
        }

        .shape:nth-child(2) {
            width: 200px;
            height: 200px;
            bottom: 20%;
            right: 10%;
            animation-duration: 30s;
        }

        .shape:nth-child(3) {
            width: 100px;
            height: 100px;
            top: 40%;
            left: 50%;
            animation-duration: 35s;
        }

        @keyframes float {
            0% {
                transform: translate(0, 0) rotate(0deg);
            }

            50% {
                transform: translate(20px, 40px) rotate(180deg);
            }

            100% {
                transform: translate(0, 0) rotate(360deg);
            }
        }

        /* Game Container */
        #game-stage {
            position: relative;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 1s ease;
        }

        #game-stage.hidden {
            opacity: 0;
            pointer-events: none;
            display: none;
        }

        .instructions {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 2rem;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
            margin-bottom: 2rem;
            animation: fadeIn 1s ease-out;
        }

        .instructions h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 3rem;
            color: var(--text-color);
            margin-bottom: 0.5rem;
        }

        .instructions p {
            font-size: 1.2rem;
        }

        .score-board {
            margin-top: 1rem;
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--primary-color);
        }

        /* Hidden Hearts */
        .heart-target {
            position: absolute;
            font-size: 2.5rem;
            color: #d62828;
            /* Slightly darker to blend but identifiable if looked for */
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0.8;
            filter: drop-shadow(0 0 5px rgba(255, 0, 0, 0.3));
            animation: pulse-soft 3s infinite;
        }

        .heart-target:hover {
            transform: scale(1.2);
            color: #ff0000;
        }

        /* Random positions for hearts (will be set by JS mostly, but examples here) */

        @keyframes pulse-soft {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.05);
            }

            100% {
                transform: scale(1);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Envelope Stage */
        #envelope-stage {
    display: none;                 /* Hide initially */
    position: fixed;               /* Fixed to viewport */
    top: 50%;                      /* 50% from top */
    left: 50%;                     /* 50% from left */
    transform: translate(-50%, -50%); /* مركز كامل */

    align-items: center;
    justify-content: center;
    z-index: 20;
    opacity: 0;

}

        #envelope-stage.visible {
            display: flex;
            opacity: 1;

        cursor: pointer;
        display: flex;

        .envelope-container:hover {

        .envelope {
            width: 300px;
            height: 200px;

            border-radius: 10px;
            position: relative;

    <style>
        /* Additional Styles for Hiding Spots */
        .hiding-spots-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 2rem;
            max-width: 800px;
            padding: 20px;
            z-index: 15;
            perspective: 1000px;
        }

        .hiding-spot {
            font-size: 3.5rem;
            cursor: pointer;
            transition: transform 0.3s ease, opacity 0.3s;
            position: relative;
            user-select: none;
            filter: drop-shadow(0 5px 5px rgba(0, 0, 0, 0.1));
        }

        .hiding-spot:hover {
            transform: scale(1.1) translateY(-5px);
        }

        .hiding-spot.shaking {
            animation: shake 0.5s cubic-bezier(.36, .07, .19, .97) both;
            color: #ccc;
            /* Fade out slightly to show checked */
            cursor: default;
        }

        .hiding-spot.revealed {
            animation: popOpen 0.5s ease forwards;
            pointer-events: none;
        }

        .hidden-heart-popup {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            font-size: 2rem;
            color: #ff0000;
            pointer-events: none;
            z-index: 20;
        }

        .pop-anim {
            animation: popHeart 1s ease forwards;
        }

        @keyframes shake {

            10%,
            90% {
                transform: translate3d(-1px, 0, 0);
            }

            20%,
            80% {
                transform: translate3d(2px, 0, 0);
            }

            30%,
            50%,
            70% {
                transform: translate3d(-4px, 0, 0);
            }

            40%,
            60% {
                transform: translate3d(4px, 0, 0);
            }
        }

        @keyframes popOpen {
            0% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.2);
                opacity: 0.8;
            }

            100% {
                transform: scale(0);
                opacity: 0;
            }
        }

        @keyframes popHeart {
            0% {
                transform: translate(-50%, -50%) scale(0);
                opacity: 0;
            }

            50% {
                transform: translate(-50%, -150%) scale(2);
                opacity: 1;
            }

            100% {
                transform: translate(-50%, -300%) scale(0);
                opacity: 0;
            }
        }

    <script>
       function restartGame() {
    // Hide letter view
    closeLetter();

    // Reset game variables
    heartsFound = 0;
    document.getElementById('counter').innerText = heartsFound;

    // Clear old spots
    const container = document.querySelector('.hiding-spots-container');
    container.innerHTML = '';
    spots = [];

    // Hide envelope stage
    const envelopeStage = document.getElementById('envelope-stage');
    envelopeStage.classList.remove('visible');
    envelopeStage.style.display = 'none';

    // Reset envelope to closed state
    const envelopeContainer = document.getElementById('envelope');
    envelopeContainer.classList.remove('open');

    // Show game stage again
    const gameStage = document.getElementById('game-stage');
    gameStage.style.display = 'flex';
    gameStage.classList.remove('hidden');

    messageShown = false;

    // Re-init game
    initGame();
}
function goHome() {
    // Redirect to homepage
    window.location.href = "index.html"; // غير الرابط لو الصفحة الرئيسية غير index.html
}
        let heartsFound = 0;
        const totalHearts = 1;

        // Items to hide things in
        const hidingItems = ['🎁', '🎁', '🎁', '🎁', '🎁'];
        let spots = [];

        window.onload = function () {
            initGame();
        };

        function initGame() {
            const container = document.querySelector('.hiding-spots-container');
            // Shuffle items
            hidingItems.sort(() => Math.random() - 0.5);

            // Limit to maybe 5 items on screen for clean look
            const displayItems = hidingItems.slice(0, 5);

            // Pick 3 random indices to hold hearts
            let heartIndices = new Set();
            while (heartIndices.size < 2) {
                heartIndices.add(Math.floor(Math.random() * displayItems.length));
            }

            displayItems.forEach((icon, index) => {
                const spot = document.createElement('div');
                spot.classList.add('hiding-spot');
                spot.innerText = icon;
                spot.dataset.hasHeart = heartIndices.has(index);
                spot.onclick = () => checkSpot(spot);
                container.appendChild(spot);
                spots.push(spot);
            });
        }

        function checkSpot(element) {
            if (element.classList.contains('shaking') || element.classList.contains('revealed')) return;

            if (element.dataset.hasHeart === "true") {
                // FOUND HEART
                element.classList.add('revealed');

                // Show floating heart
                const heart = document.createElement('div');
                heart.classList.add('hidden-heart-popup', 'pop-anim');
                heart.innerText = '❤️';
                element.appendChild(heart);

                // Sparkles at position
                const rect = element.getBoundingClientRect();
                createSparkles(rect.left + rect.width / 2, rect.top + rect.height / 2);

                heartsFound++;
                document.getElementById('counter').innerText = heartsFound;

                if (heartsFound === totalHearts) {
                    setTimeout(revealEnvelope, 1200);
                }
            } else {
                // EMPTY
                element.classList.add('shaking');
                // Optional: Change emoji to empty/sad or just fade
                // element.style.opacity = '0.5';
            }
        }

        function createSparkles(x, y) {
            for (let i = 0; i < 8; i++) {
                const sparkle = document.createElement('div');
                sparkle.classList.add('sparkle');
                sparkle.innerText = '✨';
                sparkle.style.left = (x + (Math.random() * 40 - 20)) + 'px';
                sparkle.style.top = (y + (Math.random() * 40 - 20)) + 'px';
                document.body.appendChild(sparkle);
                setTimeout(() => sparkle.remove(), 800);
            }
        }

        function revealEnvelope() {
            const gameStage = document.getElementById('game-stage');
            const envelopeStage = document.getElementById('envelope-stage');

            gameStage.classList.add('hidden');

            setTimeout(() => {
                gameStage.style.display = 'none';
                envelopeStage.style.display = 'flex';
                void envelopeStage.offsetWidth;
                envelopeStage.classList.add('visible');
            }, 1000);
        }

        function createConfetti() {
            const colors = ['#ff4d6d', '#ff8fa3', '#fff', '#gold'];
            for (let i = 0; i < 50; i++) {
                const conf = document.createElement('div');
                conf.style.position = 'fixed';
                conf.style.left = Math.random() * 100 + 'vw';
                conf.style.top = -10 + 'px';
                conf.style.width = '10px';
                conf.style.height = '10px';
                conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                conf.style.animation = `float ${Math.random() * 3 + 2}s linear forwards`;
                document.body.appendChild(conf);
                setTimeout(() => conf.remove(), 5000);
