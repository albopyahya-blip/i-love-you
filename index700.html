<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>
<style>
:root {
  /* الوضع الليلي - بني */
  --bg-dark: #2b1d16;      
  --bg-side: #3e2a20;      
  --bg-light: #4a3326;     
  
  --text-main: #f5e6d8;    
  --text-primary: #d9a066; 
  
  --btn-main: #8b5e3c;     
  --btn-hover: #a47149;    
  
  --accent: #c89b6d;       
}

/* الوضع النهاري - بينك */
[data-theme="light"] {
  --bg-dark: #ffc0d6;      
  --bg-side: #ffd6e7;      
  --bg-light: #fff0f6;     
  
  --text-main: #4a1f2d;    
  --text-primary: #ff4f9a; 
  
  --btn-main: #ff0080;     
  --btn-hover: #ff99cc;    
  
  --accent: #ff5fa2;       
}

body {
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:Arial, sans-serif;
  background: var(--bg-dark);
  color: var(--text-main);
  overflow:hidden;
  transition: background 0.5s, color 0.5s;
}

.container{
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
}

#text{
    font-size:34px;
    max-width:700px;
    min-height:120px;
    line-height:1.6;
    margin-bottom:20px;
    transition: color 0.5s;
}

/* ألوان الأزرار حسب الوضع */
button {
    padding:12px 50px;
    font-size:20px;
    border-radius:40px;
    border:1px solid var(--btn-main);
    background: var(--btn-main);
    color: var(--text-main);
    cursor:pointer;
    transition:0.25s, color 0.5s, border-color 0.5s, background 0.5s;
    margin-top:10px;
}

button:hover {
    background: var(--btn-hover);
    color: var(--text-main);
    transform:scale(1.05);
}

/* ألوان الأزرار حسب الوضع */
:root {
  --btn-main: #8b5e3c;     /* بني غامق */
  --btn-hover: #a47149;    /* بني فاتح */
}

[data-theme="light"] {
  --btn-main: #ff69b4;     /* وردي مشرق */
  --btn-hover: #ff1493;    /* وردي أغمق */
}

/* القلوب */
.heart{
    position:absolute;
    color: var(--text-primary);
    font-size:26px;
    animation:float 5s linear infinite;
}

@keyframes float{
0%{transform:translateY(0);opacity:1;}
100%{transform:translateY(-900px);opacity:0;}
}

/* Switch */
.switch {
  font-size: 15px;
  position: fixed;
  top: 20px;
  right: 20px;
  display: inline-block;
  width: 3.2em;
  height: 1.8em;
  border-radius: 30px;
  box-shadow: 0 0 8px rgba(0,0,0,0.1);
  z-index: 2000;
}

.switch input { opacity: 0; width:0; height:0; }
.slider {
  position: absolute;
  cursor: pointer;
  top: 0; left:0; right:0; bottom:0;
  background-color: var(--bg-side);
  border-radius: 30px;
  transition: 0.4s;
  overflow:hidden;
}

.slider:before {
  position:absolute;
  content:"";
  height:1em; width:1em;
  border-radius:50%;
  left:0.4em; bottom:0.4em;
  transition:0.4s;
  background-color: var(--btn-main);
  box-shadow: inset 6px -3px 0px 0px #fff;
}

.switch input:checked + .slider { background-color: var(--accent); }
.switch input:checked + .slider:before { transform: translateX(1.4em); }

/* النجوم */
.star {
  background-color: #fff;
  border-radius:50%;
  position:absolute;
  width:4px; height:4px;
  transition: all 0.4s;
}

.star_1 { left: 2em; top: 0.4em; }
.star_2 { left: 1.8em; top: 1em; }
.star_3 { left: 2.4em; top: 0.7em; }

.switch input:checked ~ .slider .star { opacity:0; }

/* السحابة */
.cloud {
  width:2.8em;
  position:absolute;
  bottom:-1em;
  left:-0.9em;
  opacity:0;
  transition:all 0.4s;
}

.switch input:checked ~ .slider .cloud { opacity:1; }

</style>
</head>
<body>

<div class="container">
    <div id="text"></div>
    <button onclick="next()">Next</button>
</div>

<label class="switch">
  <input type="checkbox" id="themeSwitch">
  <span class="slider">
    <span class="star star_1"></span>
    <span class="star star_2"></span>
    <span class="star star_3"></span>
    <span class="cloud">☁️</span>
  </span>
</label>

<script>
let messages=[
"On a completely ordinary day",
"I met someone",
"who changed my life",
"Someone who made me laugh",
"for no reason",
"And made my heart beat",
"in a different way",
"Her voice and smile",
"make everything better",
"Even the simplest moments",
"with her make me happy",
"Every word she says",
"Every look",
"Every little move",
"Makes me feel alive",
"No matter what happens around me",
"With her the world",
"Feels beautiful",
"And the truth is",
"I love you ❤️"
];

let index=0;
let text=document.getElementById("text");

function typeWriter(message,i=0){
    if(i < message.length){
        text.innerHTML += message.charAt(i);
        setTimeout(()=>typeWriter(message,i+1),40);
    } else {
        if(index === messages.length-1){
            startHearts();
            document.querySelector("button").style.display="none";
        }
    }
}

typeWriter(messages[0]);

function next(){
    index++;
    if(index < messages.length){
        text.innerHTML="";
        typeWriter(messages[index]);
    }
}

function startHearts(){
    setInterval(()=>{
        let heart=document.createElement("div");
        heart.innerHTML="❤️";
        heart.className="heart";
        heart.style.left=Math.random()*100+"vw";
        heart.style.top="100vh";
        document.body.appendChild(heart);
        setTimeout(()=>{ heart.remove(); },5000);
    },250);
}

// Theme switch
const themeSwitch = document.getElementById('themeSwitch');
const html = document.documentElement;

// الوضع الحالي
let darkMode = localStorage.getItem('theme') === 'light' ? false : true;
themeSwitch.checked = !darkMode;
html.setAttribute('data-theme', darkMode ? 'dark' : 'light');

themeSwitch.addEventListener('change', () => {
  darkMode = !themeSwitch.checked;
  html.setAttribute('data-theme', darkMode ? 'dark' : 'light');
  localStorage.setItem('theme', darkMode ? 'dark' : 'light');
});
</script>

</body>
</html>
