<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Don't press here 💘</title>

<style>
body {
    margin: 0;
    background-color: black;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

video {
    width: 100%;
    max-height: 80vh;
}

.controls {
    margin-top: 15px;
}

button {
    background: white;
    border: none;
    padding: 10px 15px;
    margin: 5px;
    font-size: 18px;
    cursor: pointer;
    border-radius: 10px;
    transition: 0.3s;
}


button.active {
    background: #ff66aa;
    color: white;
}
</style>
</head>

<body>

<!-- شيلنا source من هنا -->
<video id="player" controls autoplay muted loop></video>

<div class="controls">
    <button class="active" onclick="changeVideo(0)">1</button>
    <button onclick="changeVideo(1)">2</button>
    <button onclick="changeVideo(2)">3</button>
    <!-- <button onclick="changeVideo(3)">4</button> -->


</div>

<script>
const videos = [
    "video/WhatsApp Video 2026-03-14 at 6.54.28 AM.mp4",
    "video1/1775081854495979.mov",
    "video1/copy_8A5B6F83-5B42-4A82-9901-C0AD4627CE71.MOV"
    

    

];

const player = document.getElementById("player");
const buttons = document.querySelectorAll("button");

// 👇 ده المهم
window.onload = function() {
    changeVideo(0); // يشغل أول فيديو تلقائي
};

function changeVideo(index) {
    player.src = videos[index];
    player.play();

    buttons.forEach(btn => btn.classList.remove("active"));
    buttons[index].classList.add("active");
}
</script>

</body>
</html>
