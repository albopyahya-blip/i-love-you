    <div>
  <!-- Audio -->
  <audio id="bg-music" loop>
    <source src="sound/Albumaty.Com_mhmd_sayd_fy_ayny.mp3" type="audio/mpeg">
  </audio>

  <!-- Button -->
  <button id="music-btn"></button>

  <!-- Toggle Switch -->
  <input type="checkbox" id="checkboxInput" style="display:none;">
  <label for="checkboxInput" class="toggleSwitch">
    <div class="speaker">
      <svg xmlns="http://www.w3.org/2000/svg" version="1.0" viewBox="0 0 75 75">
        <path d="M39.389,13.769 L22.235,28.606 L6,28.606 L6,47.699 L21.989,47.699 L39.389,62.75 L39.389,13.769z" 
              style="stroke:#fff;stroke-width:5;stroke-linejoin:round;fill:#fff;"></path>
        <path d="M48,27.6a19.5,19.5 0 0 1 0,21.4M55.1,20.5a30,30 0 0 1 0,35.6M61.6,14a38.8,38.8 0 0 1 0,48.6" 
              style="fill:none;stroke:#fff;stroke-width:5;stroke-linecap:round"></path>
      </svg>
    </div>
    <div class="mute-speaker">
      <svg version="1.0" viewBox="0 0 75 75" stroke="#fff" stroke-width="5">
        <path d="m39,14-17,15H6V48H22l17,15z" fill="#fff" stroke-linejoin="round"></path>
        <path d="m49,26 20,24m0-24-20,24" fill="#fff" stroke-linecap="round"></path>
      </svg>
    </div>
  </label>
</div>

<script>
const audio = document.getElementById('bg-music');
const btn = document.getElementById('music-btn');
const toggle = document.getElementById('checkboxInput');

// دالة لتحديث حالة الصوت والنص والأيقونة
function updateAudioState(isPlaying) {
  if(isPlaying) {
    audio.muted = false;
    audio.play();
    btn.textContent = "⏸️";   // pause
    toggle.checked = true;    // Toggle على تشغيل
  } else {
    audio.pause();
    btn.textContent = "🔊";   // play
    toggle.checked = false;   // Toggle على إيقاف
  }
}

// الزرار يبدل حالة الأغنية
btn.addEventListener('click', () => {
  updateAudioState(audio.paused);
});

// التوجل يبدل حالة الأغنية
toggle.addEventListener('change', () => {
  updateAudioState(toggle.checked);
});
</script>
