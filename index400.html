<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تجربة العداد</title>
<style>
  body {
    margin:0;
    padding:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:black;
    font-family:sans-serif;
    color:white;
    font-size:50px;
  }
</style>
</head>
<body>

<div id="timer">5</div>

<script>
let totalSeconds = 5; // تجربة 3 ثواني
const timerEl = document.getElementById("timer");

function updateTimer() {
  timerEl.innerText = totalSeconds;
  if(totalSeconds === 0){
    window.location.href = "index401.html"; // هنا تضع الصفحة اللي تحب تروح لها
    clearInterval(timerInterval);
  }
  totalSeconds--;
}

const timerInterval = setInterval(updateTimer, 1000);
updateTimer(); // لتحديث أولي
</script>

</body>
</html>
