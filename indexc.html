<style>
:root {
  /* الوضع الليلي - بني */
  --bg-dark: #2b1d16;      /* خلفية رئيسية بني غامق */
  --bg-side: #3e2a20;      /* المنيو الجانبي */
  --bg-light: #4a3326;     /* خلفيات داخلية */
  
  --text-main: #f5e6d8;    /* نصوص فاتحة */
  --text-primary: #d9a066; /* عناوين */
  
  --btn-main: #8b5e3c;     /* زرار بني */
  --btn-hover: #a47149;    /* hover */
  
  --accent: #c89b6d;       /* أيقونات */
}

/* الوضع النهاري - بينك */
[data-theme="light"] {
  --bg-dark: #ffc0d6;      /* خلفية بينك */
  --bg-side: #ffd6e7;      /* منيو */
  --bg-light: #fff0f6;     /* صفحات فاتحة */
  
  --text-main: #4a1f2d;    /* نص */
  --text-primary: #ff4f9a; /* عنوان */
  
  --btn-main: #ff77bb;     /* زرار */
  --btn-hover: #ff99cc;    /* hover */
  
  --accent: #ff5fa2;       /* أيقونات */
}

body {
  background-color: var(--bg-dark);
  color: var(--text-main);
}

button {
  background-color: var(--btn-main);
  color: var(--text-main);
}

button:hover {
  background-color: var(--btn-hover);
}
body {
  height: 100vh;
}
</style>








<style>:root {
  --bg-dark: #111111;      /* مثال: خلفية عامة داكنة جديدة */
  --bg-side: #333333;      /* المنيو الجانبي */
  --bg-light: #ffe0f0;     /* صفحات خاصة */
  
  --text-main: #eeeeee;    /* نصوص عامة */
  --text-primary: #ff66aa; /* نصوص/عناوين رئيسية */
  
  --btn-main: #ff77bb;     /* زرار رئيسي */
  --btn-hover: #ff99cc;    /* hover */
  
  --accent: #70b5ff;       /* أيقونات */
}

[data-theme="light"] {
  --bg-dark: #ffccd5;
  --bg-side: #ffffff;
  --bg-light: #fff0f5;
  
  --text-main: #222222;
  --text-primary: #e6007a;
  
  --btn-main: #ff77bb;
  --btn-hover: #ff99cc;
  
  --accent: #4d94ff;
}
body {
  background-color: var(--bg-dark);
  color: var(--text-main);
}

button {
  background-color: var(--btn-main);
  color: var(--text-main);
}

button:hover {
  background-color: var(--btn-hover);
}
body {
  height: 100vh;
}
</style>





<label class="switch">
  <input type="checkbox" id="themeSwitch">
  <span class="slider">
    <span class="star star_1"></span>
    <span class="star star_2"></span>
    <span class="star star_3"></span>
    <span class="cloud">☁️</span>
  </span>
</label>

<style>
/* Switch Container أصغر */
.switch {
  font-size: 15px;
  position: fixed;
  top: 20px;
  right: 20px;
  display: inline-block;
  width: 3.2em;   /* أصغر شوي */
  height: 1.8em;  /* أصغر شوي */
  border-radius: 30px;
  box-shadow: 0 0 8px rgba(0,0,0,0.1);
  z-index: 2000;
}

.switch input {
  opacity: 0;
  width: 0;
  height: 0;
}

.slider {
  position: absolute;
  inset: 0;
  background: var(--bg-side);
  border-radius: 30px;
  cursor: pointer;
}

.slider:before {
  content: "";
  position: absolute;
  height: 1em;
  width: 1em;
  left: 0.4em;
  bottom: 0.4em;
  border-radius: 50%;
  background: var(--btn-main);
  transition: 0.4s;
}

.switch input:checked + .slider {
  background-color: var(--accent);
}

.switch input:checked + .slider:before {
  transform: translateX(1.4em);  /* تحريك أقل بسبب صغر الحجم */
  box-shadow: inset 12px -3px 0px 12px #ffcf48;
}

/* النجوم */
.star {
  background-color: #fff;
  border-radius: 50%;
  position: absolute;
  width: 4px;   /* أصغر شوي */
  height: 4px;  /* أصغر شوي */
  transition: all 0.4s;
}

.star_1 { left: 2em; top: 0.4em; }
.star_2 { left: 1.8em; top: 1em; }
.star_3 { left: 2.4em; top: 0.7em; }

.switch input:checked ~ .slider .star {
  opacity: 0;
}

/* السحابة */
.cloud {
  width: 2.8em;   /* أصغر شوي */
  position: absolute;
  bottom: -1em;
  left: -0.9em;
  opacity: 0;
  transition: all 0.4s;
}

.switch input:checked ~ .slider .cloud {
  opacity: 1;
}
</style>

<script>
const themeSwitch = document.getElementById('themeSwitch');
const html = document.documentElement;

// الوضع الحالي
let darkMode = localStorage.getItem('theme') === 'light' ? false : true;
themeSwitch.checked = !darkMode;
html.setAttribute('data-theme', darkMode ? 'dark' : 'light');

themeSwitch.addEventListener('change', () => {
  darkMode = !themeSwitch.checked;
  html.setAttribute('data-theme', darkMode ? 'dark' : 'light');
  localStorage.setItem('theme', darkMode ? 'dark' : 'light');
});
</script>
