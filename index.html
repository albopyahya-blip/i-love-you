<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>i love you</title>
<style>
:root {
  /* الوضع الليلي - بني */
  --bg-dark: #2b1d16;      /* خلفية رئيسية بني غامق */
  --bg-side: #3e2a20;      /* المنيو الجانبي */
  --bg-light: #4a3326;     /* خلفيات داخلية */
  
  --text-main: #f5e6d8;    /* نصوص فاتحة */
  --text-primary: #d9a066; /* عناوين */
  
  --btn-main: #8b5e3c;     /* زرار بني */
  --btn-hover: #a47149;    /* hover */
  
  --accent: #c89b6d;       /* أيقونات */
}

/* الوضع النهاري - بينك */
[data-theme="light"] {
  --bg-dark: #ffc0d6;      /* خلفية بينك */
  --bg-side: #ffd6e7;      /* منيو */
  --bg-light: #fff0f6;     /* صفحات فاتحة */
  
  --text-main: #4a1f2d;    /* نص */
  --text-primary: #ff4f9a; /* عنوان */
  
  --btn-main: #ff77bb;     /* زرار */
  --btn-hover: #ff99cc;    /* hover */
  
  --accent: #ff5fa2;       /* أيقونات */
}

/* الجسم كله مركزي */
body {
    margin: 0;
    padding: 0;
    min-height: 100vh;
    background: var(--bg-dark);
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    font-family: 'Arial', sans-serif;
    color: var(--text-main);
    box-sizing: border-box;
}

/* العنوان */
h2 {
    margin: 0 0 20px 0;
    font-size: 1.5rem;
    text-align: center;
    letter-spacing: 1px;
}

/* صندوق الإدخال */
input {
    padding: 12px 18px;
    font-size: 1.2rem;
    border-radius: 12px;
    border: 2px solid var(--btn-main);
    background-color: rgba(255, 255, 255, 0.05);
    color: var(--text-main);
    margin-bottom: 15px;
    width: 80%;
    max-width: 300px;
    text-align: center;
    transition: all 0.3s ease;
}

/* الزرار */
button {
    padding: 10px 25px;
    font-size: 1.2rem;
    color: var(--text-main);
    background: linear-gradient(90deg, var(--btn-main), var(--btn-hover));
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 4px 12px rgba(255, 105, 180, 0.4);
}

button:hover {
    transform: scale(1.05);
    box-shadow: 0 6px 18px rgba(255, 105, 180, 0.6);
}

/* رسالة الخطأ */
.alert {
    position: fixed; 
    top: 15px;
    left: 50%;
    transform: translateX(-50%);
    background-color: rgba(255, 105, 180, 0.9);
    padding: 8px 15px;
    border-radius: 10px;
    color: #fff;
    font-weight: bold;
    display: none;
    opacity: 0;
    transition: all 0.5s ease;
    pointer-events: none;
    white-space: nowrap;
    font-size: 1.1rem;
}

/* Media query للشاشات الكبيرة */
@media screen and (min-width: 600px) {
    h2 { font-size: 2rem; }
    input, button { font-size: 1.4rem; max-width: 350px; }
    .alert { font-size: 1.3rem; }
}

/* ── Theme Switch أصغر ── */
.switch {
  font-size: 15px;
  position: fixed;
  top: 20px;
  right: 20px;
  display: inline-block;
  width: 3.2em;
  height: 1.8em;
  border-radius: 30px;
  box-shadow: 0 0 8px rgba(0,0,0,0.1);
  z-index: 2000;
}

.switch input { opacity: 0; width: 0; height: 0; }

.slider {
  position: absolute;
  cursor: pointer;
  top: 0; left: 0; right: 0; bottom: 0;
  background-color: var(--bg-side);
  transition: 0.4s;
  border-radius: 30px;
  overflow: hidden;
}

.slider:before {
  position: absolute;
  content: "";
  height: 1em; width: 1em;
  border-radius: 50%;
  left: 0.4em; bottom: 0.4em;
  transition: 0.4s cubic-bezier(0.81,-0.04,0.38,1.5);
  background-color: var(--btn-main);
  box-shadow: inset 6px -3px 0px 0px #fff;
}

.switch input:checked + .slider {
  background-color: var(--accent);
}

.switch input:checked + .slider:before {
  transform: translateX(1.4em);
  box-shadow: inset 12px -3px 0px 12px #ffcf48;
}

.star {
  background-color: #fff;
  border-radius: 50%;
  position: absolute;
  width: 4px; height: 4px;
  transition: all 0.4s;
}

.star_1 { left: 2em; top: 0.4em; }
.star_2 { left: 1.8em; top: 1em; }
.star_3 { left: 2.4em; top: 0.7em; }

.switch input:checked ~ .slider .star { opacity: 0; }

.cloud {
  width: 2.8em;
  position: absolute;
  bottom: -1em; left: -0.9em;
  opacity: 0;
  transition: all 0.4s;
}

.switch input:checked ~ .slider .cloud { opacity: 1; }
</style>
</head>
<body>

<h2>Enter the password</h2>
<input type="text" id="keyInput" placeholder="password....">
<button onclick="checkWord()">Let's go</button>
<div class="alert" id="alertMsg">الكلمة غير صحيحة! حاول مرة أخرى.</div>

<script>
let alertTimeout;

function checkWord(){
    const inputField = document.getElementById('keyInput');
    const input = inputField.value.trim();
    const secretWords = ["maloktyyy", "yayouyyy", "27/2"];
    const alertMsg = document.getElementById('alertMsg');

    if(alertMsg.style.display === 'block'){
        clearTimeout(alertTimeout);
        alertMsg.style.opacity = '0';
        setTimeout(() => { alertMsg.style.display = 'none'; }, 500);
    }

    if(secretWords.includes(input)){
        window.open('index1.html', '_blank');
    } else {
        inputField.classList.add('shake');
        setTimeout(() => inputField.classList.remove('shake'), 400);

        inputField.value = '';
        inputField.focus();

        alertMsg.style.display = 'block';
        setTimeout(() => { alertMsg.style.opacity = '1'; }, 50);

        alertTimeout = setTimeout(() => {
            alertMsg.style.opacity = '0';
            setTimeout(() => { alertMsg.style.display = 'none'; }, 500);
        }, 2500);
    }
}
</script>

<label class="switch">
  <input type="checkbox" id="themeSwitch">
  <span class="slider">
    <span class="star star_1"></span>
    <span class="star star_2"></span>
    <span class="star star_3"></span>
    <span class="cloud">☁️</span>
  </span>
</label>

<script>
const themeSwitch = document.getElementById('themeSwitch');
const html = document.documentElement;

let darkMode = localStorage.getItem('theme') === 'light' ? false : true;
themeSwitch.checked = !darkMode;
html.setAttribute('data-theme', darkMode ? 'dark' : 'light');

themeSwitch.addEventListener('change', () => {
  darkMode = !themeSwitch.checked;
  html.setAttribute('data-theme', darkMode ? 'dark' : 'light');
  localStorage.setItem('theme', darkMode ? 'dark' : 'light');
});
</script>
</body>
</html>
