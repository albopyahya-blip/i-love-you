<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>i love you</title>
<style>
/* الجسم كله يبقى مركزي تمام */
body {
    margin: 0;
    padding: 0;
    min-height: 100vh;
    background: linear-gradient(135deg, #1a1a1a, #000000);
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    font-family: 'Arial', sans-serif;
    color: #fff;
    box-sizing: border-box;
}

/* العنوان أصغر ومركزي */
h2 {
    margin: 0 0 20px 0; /* مسافة صغيرة تحت العنوان */
    font-size: 1.5rem; /* أصغر على الموبايل */
    text-align: center;
    letter-spacing: 1px;
}

/* صندوق الإدخال */
input {
    padding: 12px 18px;
    font-size: 1.2rem; /* أصغر على الموبايل */
    border-radius: 12px;
    border: 2px solid #ff4da6;
    background-color: rgba(255, 255, 255, 0.05);
    color: #fff;
    margin-bottom: 15px;
    width: 80%;
    max-width: 300px;
    text-align: center;
    transition: all 0.3s ease;
}

/* الزرار */
button {
    padding: 10px 25px;
    font-size: 1.2rem; /* أصغر */
    color: #fff;
    background: linear-gradient(90deg, #ff4da6, #ff2f92);
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 4px 12px rgba(255, 77, 166, 0.4);
}

button:hover {
    transform: scale(1.05);
    box-shadow: 0 6px 18px rgba(255, 77, 166, 0.6);
}

/* رسالة الخطأ من فوق */
.alert {
    position: fixed; 
    top: 15px;
    left: 50%;
    transform: translateX(-50%);
    background-color: rgba(255, 77, 166, 0.9);
    padding: 8px 15px;
    border-radius: 10px;
    color: #fff;
    font-weight: bold;
    display: none;
    opacity: 0;
    transition: all 0.5s ease;
    pointer-events: none;
    white-space: nowrap;
    font-size: 1.1rem;
}

/* Media query للشاشات الكبيرة */
@media screen and (min-width: 600px) {
    h2 {
        font-size: 2rem; 
    }
    input, button {
        font-size: 1.4rem;
        max-width: 350px;
    }
    .alert {
        font-size: 1.3rem;
    }
}
</style>
</head>
<body>

<h2>Enter the password</h2>
<input type="text" id="keyInput" placeholder="password....">
<button onclick="checkWord()">Let's go</button>
<div class="alert" id="alertMsg">الكلمة غير صحيحة! حاول مرة أخرى.</div>

<script>
let alertTimeout;

function checkWord(){
    const inputField = document.getElementById('keyInput');
    const input = inputField.value.trim();
    const secretWords = ["maloktyyy", "yayouyyy", "27/2"];
    const alertMsg = document.getElementById('alertMsg');

    if(alertMsg.style.display === 'block'){
        clearTimeout(alertTimeout);
        alertMsg.style.opacity = '0';
        setTimeout(() => { alertMsg.style.display = 'none'; }, 500);
    }

    if(secretWords.includes(input)){
        window.open('index1.html', '_blank');
    } else {
        inputField.classList.add('shake');
        setTimeout(() => inputField.classList.remove('shake'), 400);

        inputField.value = '';
        inputField.focus();

        alertMsg.style.display = 'block';
        setTimeout(() => { alertMsg.style.opacity = '1'; }, 50);

        alertTimeout = setTimeout(() => {
            alertMsg.style.opacity = '0';
            setTimeout(() => { alertMsg.style.display = 'none'; }, 500);
        }, 2500);
    }
}
</script>

</body>
</html>
