<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>eid mubarak</title>

<style>
/* ===================== متغيرات الثيم ===================== */
:root {
  --bg-dark: #111111;      /* خلفية عامة داكنة */
  --bg-side: #333333;      /* المنيو الجانبي */
  --bg-light: #ffe0f0;     /* صفحات خاصة */
  
  --text-main: #eeeeee;    /* نصوص عامة */
  --text-primary: #ff66aa; /* نصوص/عناوين رئيسية */
  
  --btn-main: #ff77bb;     /* زرار رئيسي */
  --btn-hover: #ff99cc;    /* hover */
  
  --accent: #70b5ff;       /* أيقونات */
}

[data-theme="light"] {
  --bg-dark: #ffccd5;
  --bg-side: #ffffff;
  --bg-light: #fff0f5;
  
  --text-main: #222222;
  --text-primary: #ff66aa;
  
  --btn-main: #ff77bb;
  --btn-hover: #ff99cc;
  
  --accent: #4d94ff;
}

/* ===================== ستايل عام ===================== */
body {
  background-color: var(--bg-dark);
  color: var(--text-main);
  font-family: Arial, sans-serif;
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

button {
  background-color: var(--btn-main);
  color: var(--text-main);
  cursor: pointer;
  border: none;
  border-radius: 10px;
  padding: 10px 20px;
  font-size: 18px;
}

button:hover {
  background-color: var(--btn-hover);
}

/* ===================== الكرت ===================== */

.card {
  width: 90%;           /* بدل 350px */
  height: 250px;
  background: var(--text-primary);
  border-radius: 20px;
  position: relative;
  box-shadow: 0 10px 25px rgba(0,0,0,0.3);
  overflow: hidden;
  cursor: pointer;
  text-align: center;
  padding: 20px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  font-weight: bold;
   max-width: 400px;     /* أقصى حجم للكرت */
  min-height: 200px;
  padding: 15px;
  font-size: clamp(16px, 2vw, 20px); /* حجم الخط يتغير حسب الشاشة */
  color: var(--text-main);
}

@media (max-width: 400px) {
  .card {
    width: 75%;       /* يملأ 90% من عرض الشاشة الصغيرة */
    height: 150px;;
    font-size: 14px;
  }

  .card-text {
    font-size: 12px;
    max-height: 40vh;
  }
}
/* ===================== Scroll داخل الكرت ===================== */
.card-text::-webkit-scrollbar {
  width: 8px;
}

.card-text::-webkit-scrollbar-thumb {
  background-color: #ffffff; /* اللون الجديد للـ Scroll */
  border-radius: 10px;
  border: 2px solid #eee;
}

.card-text::-webkit-scrollbar-thumb:hover {
  background-color: #ff3388; /* لون عند Hover */
}

.card-text::-webkit-scrollbar-thumb:hover {
  background-color: var(--btn-hover); /* لون عند Hover حسب الثيم */
}
/* نص الرسالة داخل الكرت */
.card-text {
  display: none;
  width: 100%;
  height: 100%;
  overflow-y: auto;
  padding: 10px;
  background: rgba(0,0,0,0.1);
  border-radius: 10px;
  white-space: pre-wrap;
  text-align: left;    /* محاذاة للنص الإنجليزي */
  direction: ltr;  
  font-size: 18px;
  box-sizing: border-box;
}

/* رسالة الخطأ */
.error-message {
  position: absolute;
  top: 10px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0, 0, 0, 0.175);
  color: #fff;
  padding: 9px 5px;
  border-radius: 25px;
  font-size: 12px;
  display: none;
  z-index: 10;
  animation: fadein 0.3s;
}

@keyframes fadein {
  from {opacity: 0;}
  to {opacity: 1;}
}

/* خانة كلمة المرور */
.password-container {
  display: none;
  margin-top: 20px;
  text-align: center;
}

.password-container input {
  padding: 10px;
  font-size: 18px;
  border-radius: 10px;
  border: 2px solid var(--btn-main);
  outline: none;
  width: 200px;
}
@media (max-width: 400px) {
  .password-container input {
    width: 60%;        /* يتوسع حسب عرض الموبايل */
    font-size: 13px;
  }
  .password-container button {
    width: 29%;
    font-size: 13px;
  }
}
</style>
</head>
<body>

<div class="card" id="card">
  <span id="cardLabel">Click here to get your gift</span>
  <div class="card-text" id="message"></div>
  <div class="error-message" id="errorMessage">Try again wrong password</div>
</div>

<div class="password-container" id="passwordContainer">
  <input type="password" id="passwordInput" placeholder="Enter your password">
  <button onclick="checkPassword()">Open</button>
</div>
<audio id="audio" src="sound/12._Ahla_Haga_Feeky.mp3"></audio>
<script>
const card = document.getElementById('card');
const cardLabel = document.getElementById('cardLabel');
const passwordContainer = document.getElementById('passwordContainer');
const passwordInput = document.getElementById('passwordInput');
const message = document.getElementById('message');
const errorMessage = document.getElementById('errorMessage');

let unlocked = false;

card.addEventListener('click', () => {
  if (!unlocked) {
    passwordContainer.style.display = 'block';
  }
});

function checkPassword() {
  const input = passwordInput.value;
  const correctPassword = "eid";
   // ضع كلمة المرور هنا
  if(input === correctPassword){
    unlocked = true;
    passwordContainer.style.display = 'none';
    cardLabel.style.display = 'none';
    message.style.display = 'block';
    message.textContent = `

l feeling in this world 
`
;
 audio.play().catch(e => console.log("مشكلة في تشغيل الصوت:", e));

  } else {
    // اظهار رسالة الخطأ داخل الكرت
    errorMessage.style.display = 'block';
    passwordInput.value = "";
    passwordInput.focus();
    setTimeout(() => {
      errorMessage.style.display = 'none';
    }, 3000);
  }
}
</script>

<label class="switch">
  <input type="checkbox" id="themeSwitch">
  <span class="slider">
    <span class="star star_1"></span>
    <span class="star star_2"></span>
    <span class="star star_3"></span>
    <span class="cloud">☁️</span>
  </span>
</label>

<style>
/* Switch Container أصغر */
.switch {
  font-size: 15px;
  position: fixed;
  top: 20px;
  right: 20px;
  display: inline-block;
  width: 3.2em;   /* أصغر شوي */
  height: 1.8em;  /* أصغر شوي */
  border-radius: 30px;
  box-shadow: 0 0 8px rgba(0,0,0,0.1);
  z-index: 2000;
}

.switch input {
  opacity: 0;
  width: 0;
  height: 0;
}

.slider {
  position: absolute;
  cursor: pointer;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background-color: var(--bg-side);
  transition: 0.4s;
  border-radius: 30px;
  overflow: hidden;
}

.slider:before {
  position: absolute;
  content: "";
  height: 1em;       /* أصغر شوي */
  width: 1em;        /* أصغر شوي */
  border-radius: 50%;
  left: 0.4em;
  bottom: 0.4em;
  transition: 0.4s cubic-bezier(0.81, -0.04, 0.38, 1.5);
  background-color: var(--btn-main);
  box-shadow: inset 6px -3px 0px 0px #fff;
}

.switch input:checked + .slider {
  background-color: var(--accent);
}

.switch input:checked + .slider:before {
  transform: translateX(1.4em);  /* تحريك أقل بسبب صغر الحجم */
  box-shadow: inset 12px -3px 0px 12px #ffcf48;
}

/* النجوم */
.star {
  background-color: #fff;
  border-radius: 50%;
  position: absolute;
  width: 4px;   /* أصغر شوي */
  height: 4px;  /* أصغر شوي */
  transition: all 0.4s;
}

.star_1 { left: 2em; top: 0.4em; }
.star_2 { left: 1.8em; top: 1em; }
.star_3 { left: 2.4em; top: 0.7em; }

.switch input:checked ~ .slider .star {
  opacity: 0;
}

/* السحابة */
.cloud {
  width: 2.8em;   /* أصغر شوي */
  position: absolute;
  bottom: -1em;
  left: -0.9em;
  opacity: 0;
  transition: all 0.4s;
}

.switch input:checked ~ .slider .cloud {
  opacity: 1;
}
</style>

<script>
const themeSwitch = document.getElementById('themeSwitch');
const html = document.documentElement;

// الوضع الحالي
let darkMode = localStorage.getItem('theme') === 'light' ? false : true;
themeSwitch.checked = !darkMode;
html.setAttribute('data-theme', darkMode ? 'dark' : 'light');

themeSwitch.addEventListener('change', () => {
  darkMode = !themeSwitch.checked;
  html.setAttribute('data-theme', darkMode ? 'dark' : 'light');
  localStorage.setItem('theme', darkMode ? 'dark' : 'light');
});
</script>

</body>
</html>
