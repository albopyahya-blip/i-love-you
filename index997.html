<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Since We Met ❤️</title>

<style>
  
* { box-sizing: border-box; margin:0; padding:0; }

body {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  text-align: center;
  transition: all 0.4s ease;
}

.container {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 90%;
}

h1 {
  font-size: 36px;
  margin-bottom: 25px;
  transition: all 0.3s ease;
}

.box {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 15px;
  padding: 25px 20px;
  border-radius: 20px;
  backdrop-filter: blur(12px);
}

.time-box {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 10px;
  border-radius: 12px;
  max-width: 120px;
  min-width: 80px;
}

.time-number {
  font-size: 24px;
  font-weight: bold;
}

.time-label {
  font-size: 13px;
  margin-top: 5px;
}

/* Fixed buttons at bottom center */
.sub-btn-container {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 20px;
  z-index: 100;
}

.sub-btn {
  border: none;
  cursor: pointer;
  font-size: 18px;
  width: 50px;
  height: 50px;
  border-radius: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
  box-shadow: 0 3px 6px rgba(0,0,0,0.2);
  transition: 0.3s;
}

.sub-btn:hover {
  transform: scale(1.1);
}

/* Switch Container */
.switch {
  font-size: 15px;
  position: fixed;
  top: 20px;
  right: 20px;
  display: inline-block;
  width: 3.2em;
  height: 1.8em;
  border-radius: 30px;
  box-shadow: 0 0 8px rgba(0,0,0,0.1);
  z-index: 2000;
}

.switch input {
  opacity: 0;
  width: 0;
  height: 0;
}

.slider {
  position: absolute;
  cursor: pointer;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background-color: var(--bg-side);
  transition: 0.4s;
  border-radius: 30px;
  overflow: hidden;
}

.slider:before {
  position: absolute;
  content: "";
  height: 1em;
  width: 1em;
  border-radius: 50%;
  left: 0.4em;
  bottom: 0.4em;
  transition: 0.4s cubic-bezier(0.81, -0.04, 0.38, 1.5);
  background-color: var(--btn-main);
  box-shadow: inset 6px -3px 0px 0px #fff;
}

.switch input:checked + .slider {
  background-color: var(--accent);
}

.switch input:checked + .slider:before {
  transform: translateX(1.4em);
  box-shadow: inset 12px -3px 0px 12px #ffcf48;
}

/* Stars */
.star {
  background-color: #fff;
  border-radius: 50%;
  position: absolute;
  width: 4px;
  height: 4px;
  transition: all 0.4s;
}

.star_1 { left: 2em; top: 0.4em; }
.star_2 { left: 1.8em; top: 1em; }
.star_3 { left: 2.4em; top: 0.7em; }

.switch input:checked ~ .slider .star {
  opacity: 0;
}

/* Cloud */
.cloud {
  width: 2.8em;
  position: absolute;
  bottom: -1em;
  left: -0.9em;
  opacity: 0;
  transition: all 0.4s;
}

.switch input:checked ~ .slider .cloud {
  opacity: 1;
}

/* Responsive */
@media (max-width:480px){
  .sub-btn { width: 40px; height: 40px; font-size:16px; }
  .sub-btn-container { gap: 15px; }
  .time-number { font-size: 20px; }
  .time-label { font-size: 11px; }
  .time-box { min-width: 60px; padding: 6px; }
  .box { padding: 15px; }
}

/* ===== Colors & Themes ===== */
:root {
  --bg-dark: #111111;
  --bg-side: #333333;
  --bg-light: #ffe0f0;
  --text-main: #eeeeee;
  --text-primary: #ff66aa;
  --btn-main: #ff77bb;
  --btn-hover: #ff99cc;
  --accent: #70b5ff;
}

[data-theme="light"] {
  --bg-dark: #ffccd5;
  --bg-side: #ffffff;
  --bg-light: #fff0f5;
  --text-main: #222222;
  --text-primary: #e6007a;
  --btn-main: #ff77bb;
  --btn-hover: #ff99cc;
  --accent: #4d94ff;
}

/* Apply theme */
body {
  background-color: var(--bg-dark);
  color: var(--text-main);
}

h1 { color: var(--text-primary); }

.box, .time-box {
  background-color: rgba(255,255,255,0.2);
  color: var(--text-main);
}

.sub-btn {
  background-color: var(--btn-main);
  color: var(--text-main);
}

.sub-btn:hover {
  background-color: var(--btn-hover);
}
</style>
</head>
<body>

<div class="container">
  <h1 id="title">Since We Met</h1>
  <div class="box" id="timer-box">
    <div class="time-box" id="years-box">
      <div class="time-number" id="years"></div>
      <div class="time-label">Years</div>
    </div>
    <div class="time-box" id="months-box">
      <div class="time-number" id="months"></div>
      <div class="time-label">Months</div>
    </div>
    <div class="time-box" id="days-box">
      <div class="time-number" id="days"></div>
      <div class="time-label">Days</div>
    </div>
    <div class="time-box" id="hours-box">
      <div class="time-number" id="hours"></div>
      <div class="time-label">Hours</div>
    </div>
    <div class="time-box" id="minutes-box">
      <div class="time-number" id="minutes"></div>
      <div class="time-label">Minutes</div>
    </div>
    <div class="time-box" id="seconds-box">
      <div class="time-number" id="seconds"></div>
      <div class="time-label">Seconds</div>
    </div>
  </div>
</div>

<!-- Buttons -->
<div class="sub-btn-container">
  <button class="sub-btn sub-btnY">Y</button>
  <button class="sub-btn sub-btnHeart">💖</button>
  <button class="sub-btn sub-btnM">M</button>
</div>

<!-- Theme Switch -->
<label class="switch">
  <input type="checkbox" id="themeSwitch">
  <span class="slider">
    <span class="star star_1"></span>
    <span class="star star_2"></span>
    <span class="star star_3"></span>
    <span class="cloud">☁️</span>
  </span>
</label>

<script>
// Timer
let startDate = new Date("2026-01-20 00:00:00");
const titleEl = document.getElementById("title");

const yearsEl = document.getElementById("years");
const monthsEl = document.getElementById("months");
const daysEl = document.getElementById("days");
const hoursEl = document.getElementById("hours");
const minutesEl = document.getElementById("minutes");
const secondsEl = document.getElementById("seconds");

const yearsBox = document.getElementById("years-box");
const monthsBox = document.getElementById("months-box");
const daysBox = document.getElementById("days-box");
const hoursBox = document.getElementById("hours-box");
const minutesBox = document.getElementById("minutes-box");
const secondsBox = document.getElementById("seconds-box");

function calculateDiff(start){
  let now = new Date();
  let years = now.getFullYear() - start.getFullYear();
  let months = now.getMonth() - start.getMonth();
  let days = now.getDate() - start.getDate();
  let hours = now.getHours() - start.getHours();
  let minutes = now.getMinutes() - start.getMinutes();
  let seconds = now.getSeconds() - start.getSeconds();

  if(seconds<0){ seconds+=60; minutes--; }
  if(minutes<0){ minutes+=60; hours--; }
  if(hours<0){ hours+=24; days--; }
  if(days<0){
    let prevMonth = new Date(now.getFullYear(), now.getMonth(), 0).getDate();
    days += prevMonth;
    months--;
  }
  if(months<0){ months+=12; years--; }

  yearsEl.innerText = years;
  monthsEl.innerText = months;
  daysEl.innerText = days;
  hoursEl.innerText = hours;
  minutesEl.innerText = minutes;
  secondsEl.innerText = seconds;

  yearsBox.style.display = (years > 0) ? "flex" : "none";
  monthsBox.style.display = "flex";
  daysBox.style.display = "flex";
  hoursBox.style.display = "flex";
  minutesBox.style.display = "flex";
  secondsBox.style.display = "flex";
}

function updateTimer(){ calculateDiff(startDate); }
setInterval(updateTimer,1000);
updateTimer();

// Buttons to change date/title
document.querySelector(".sub-btnHeart").addEventListener("click",()=>{
  startDate = new Date("2026-01-20 00:00:00");
  titleEl.innerText = "Since We Met";
});
document.querySelector(".sub-btnM").addEventListener("click",()=>{
  startDate = new Date("2008-04-02 00:00:00");
  titleEl.innerText = "maloktyyy";
});
document.querySelector(".sub-btnY").addEventListener("click",()=>{
  startDate = new Date("2006-08-29 00:00:00");
  titleEl.innerText = "yayouyyy";
});

// Theme Switch
const themeSwitch = document.getElementById('themeSwitch');
const html = document.documentElement;

// Read saved theme
let savedTheme = localStorage.getItem('theme') || 'dark';
html.setAttribute('data-theme', savedTheme);
themeSwitch.checked = savedTheme === 'light';

themeSwitch.addEventListener('change', () => {
  const newTheme = themeSwitch.checked ? 'light' : 'dark';
  html.setAttribute('data-theme', newTheme);
  localStorage.setItem('theme', newTheme);
});
</script>

</body>


</html>
