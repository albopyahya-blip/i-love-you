<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coming Soon</title>
<style>
  body {
    margin: 0;
    padding: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background-color: #000;
    color: #fff;
    font-family: 'Arial', sans-serif;
    flex-direction: column;
  }

  /* حلقة تحميل متوهجة */
  .loader {
    width: 100px;
    height: 100px;
    border: 10px solid rgba(255,255,255,0.1);
    border-top: 10px solid #ff4081; /* اللون المتوهج */
    border-radius: 50%;
    animation: spin 1s linear infinite;
    box-shadow: 0 0 20px #ff4081;
    margin-bottom: 30px;
  }

  @keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  /* كلمة Soon بدون توهج */
  .soon {
    font-size: 3em;
    font-weight: bold;
    letter-spacing: 3px;
    color: #ff4081; /* لون ثابت */
  }
</style>
</head>
<body>

<div class="loader"></div>
<div class="soon">Soon</div>

</body>
</html>
