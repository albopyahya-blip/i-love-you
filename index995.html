<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>X O 2 Players</title>

<style>
:root {
  --bg-dark: #111111;
  --bg-side: #333333;
  --text-main: #eeeeee;
  --text-primary: #ff66aa;
  --btn-main: #ff77bb;
  --btn-hover: #ff99cc;
}

body {
  margin: 0;
  height: 100vh;
  background: var(--bg-dark);
  color: var(--text-main);
  font-family: Arial;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

.board {
  display: grid;
  grid-template-columns: repeat(3, 100px);
  gap: 10px;
  margin-top: 20px;
}

.cell {
  width: 100px;
  height: 100px;
  background: var(--bg-side);
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 2.5em;
  cursor: pointer;
  border-radius: 12px;
  transition: 0.2s;
}

.cell:hover {
  background: var(--btn-hover);
}

#status {
  margin-top: 20px;
  font-size: 1.5em;
  color: var(--text-primary);
}

button{
  margin-top: 20px;
  padding: 10px 20px;
  border:none;
  border-radius:15px;
  cursor:pointer;
  background: var(--btn-main);
  color: var(--text-main);
  font-weight:bold;
}
button:hover{
  background: var(--btn-hover);
}
</style>
</head>

<body>

<h2 id="status">Player X Turn</h2>

<div class="board">
  <div class="cell"></div>
  <div class="cell"></div>
  <div class="cell"></div>
  <div class="cell"></div>
  <div class="cell"></div>
  <div class="cell"></div>
  <div class="cell"></div>
  <div class="cell"></div>
  <div class="cell"></div>
</div>

<button onclick="restart()">Restart</button>

<script>
let cells = document.querySelectorAll(".cell");
let status = document.getElementById("status");
let board = ["","","","","","","","",""];
let currentPlayer = "X";

const winPatterns = [
  [0,1,2],[3,4,5],[6,7,8],
  [0,3,6],[1,4,7],[2,5,8],
  [0,4,8],[2,4,6]
];

cells.forEach((cell, index) => {
  cell.addEventListener("click", () => {
    if(board[index] !== "" || checkWinner()) return;

    board[index] = currentPlayer;
    cell.textContent = currentPlayer;

    if(checkWinner()){
      status.textContent = `Player ${currentPlayer} Wins! 🎉`;
    } else if(!board.includes("")){
      status.textContent = "Draw! 🤝";
    } else {
      currentPlayer = currentPlayer === "X" ? "O" : "X";
      status.textContent = `Player ${currentPlayer} Turn`;
    }
  });
});

function checkWinner(){
  return winPatterns.some(pattern => {
    return pattern.every(i => board[i] !== "" && board[i] === board[pattern[0]]);
  });
}

function restart(){
  board = ["","","","","","","","",""];
  cells.forEach(c => c.textContent = "");
  currentPlayer = "X";
  status.textContent = "Player X Turn";
}
</script>

</body>
</html>
