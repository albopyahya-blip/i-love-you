<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">

<title>X O Game</title>

<style>
:root {
  --bg-dark: #111111;
  --bg-side: #333333;
  --bg-light: #ffe0f0;
  
  --text-main: #eeeeee;
  --text-primary: #ff66aa;
  
  --btn-main: #ff77bb;
  --btn-hover: #ff99cc;
  
  --accent: #70b5ff;
}

[data-theme="light"] {
  --bg-dark: #ffccd5;
  --bg-side: #ffffff;
  --bg-light: #fff0f5;
  
  --text-main: #222222;
  --text-primary: #e6007a;
  
  --btn-main: #ff77bb;
  --btn-hover: #ff99cc;
  
  --accent: #4d94ff;
}

body {
  margin: 0;
  height: 100vh;
  background: var(--bg-dark);
  color: var(--text-main);
  font-family: Arial;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* اللعبة */
.game {
  text-align: center;
}

.board {
  display: grid;
  grid-template-columns: repeat(3, 90px);
  gap: 10px;
  margin-top: 20px;
}

.cell {
  width: 90px;
  height: 90px;
  background: var(--bg-side);
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 2em;
  cursor: pointer;
  border-radius: 12px;
  transition: 0.2s;
}
.choice {
  text-align: center;
}

.choice-title {
  font-size: 1em;
  margin-bottom: 15px;
}

.choice-buttons button {
  margin: 0 10px;
  padding: 12px 25px;
  font-size: 1em;
  border-radius: 15px;
}
/* .cell:hover {
  background: var(--btn-hover);
} */

#status {
  color: var(--text-primary);
  font-size: 1.2em; /* حجم مناسب */
  min-height: 2.5em; /* ارتفاع ثابت لمنع التغيير */
  max-width: 270px; /* عرض ثابت للرسائل */
  text-align: center; /* محاذاة مركز */
  margin: 0 auto; /* يثبت النص في الوسط */
  padding: 5px 10px;
  word-wrap: break-word; /* يكسر الكلمات الطويلة بدل ما يوسع العنصر */
  overflow-wrap: break-word; /* ضمان الكسر */
  white-space: normal; /* يسمح للكسر الطبيعي للكلمات */
}


button{
  border: none;

    margin-top: 20px;
  padding:12px 20px;
  border:none;
  border-radius:20px;
  font-weight:bold;
  cursor:pointer;
  background: var(--btn-main);
  color: var(--text-main);
}

button:hover {
  background: var(--btn-hover);
}

/* زرار الثيم */
.switch {
  font-size: 15px;
  position: fixed;
  top: 20px;
  right: 20px;
  display: inline-block;
  width: 3.2em;   /* أصغر شوي */
  height: 1.8em;  /* أصغر شوي */
  border-radius: 30px;
  box-shadow: 0 0 8px rgba(0,0,0,0.1);
  z-index: 2000;
}

.switch input {
  opacity: 0;
  width: 0;
  height: 0;
}

.slider {
  position: absolute;
  inset: 0;
  background: var(--bg-side);
  border-radius: 30px;
  cursor: pointer;
}

.slider:before {
  content: "";
  position: absolute;
  height: 1em;
  width: 1em;
  left: 0.4em;
  bottom: 0.4em;
  border-radius: 50%;
  background: var(--btn-main);
  transition: 0.4s;
}

input:checked + .slider {
  background: var(--accent);
}

input:checked + .slider:before {
  transform: translateX(1.4em);
}
</style>
</head>

<!-- زرار الثيم -->
<label class="switch">
  <input type="checkbox" id="themeSwitch">
  <span class="slider"></span>
</label>
<div class="choice" id="choice">
  <h2 class="choice-title">Which one will you play as, my love? X or O?</h2>
  <div class="choice-buttons">
    <button onclick="startGame('X')">X</button>
    <button onclick="startGame('O')">O</button>
  </div>
</div>
<!-- اللعبة -->
<div class="game" id="game" style="display:none;">
        

  <h2 id="status">Your Turn (X)</h2>

  <div class="board">
    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell"></div>
  </div>

  <button onclick="restart()">Restart</button>
</div>

<script>
// ===== الثيم =====
const themeSwitch = document.getElementById('themeSwitch');
const html = document.documentElement;

let darkMode = localStorage.getItem('theme') !== 'light';
themeSwitch.checked = !darkMode;
html.setAttribute('data-theme', darkMode ? 'dark' : 'light');

themeSwitch.addEventListener('change', () => {
  darkMode = !themeSwitch.checked;
  html.setAttribute('data-theme', darkMode ? 'dark' : 'light');
  localStorage.setItem('theme', darkMode ? 'dark' : 'light');
});

// ===== اللعبة =====
let cells = document.querySelectorAll(".cell");
let status = document.getElementById("status");

let board = ["", "", "", "", "", "", "", "", ""];
let player, ai;
let currentTurn = "X";

const winPatterns = [
  [0,1,2],[3,4,5],[6,7,8],
  [0,3,6],[1,4,7],[2,5,8],
  [0,4,8],[2,4,6]
];

cells.forEach((cell, index) => {
  cell.addEventListener("click", () => {
    if (board[index] !== "" || checkWinner() || currentTurn !== player) return;

    makeMove(index, player);

    if (!checkWinner()) {
      setTimeout(aiMove, 400);
    }
  });
});

function makeMove(index, current) {
  board[index] = current;
  cells[index].textContent = current;

  if (checkWinner()) {
    status.textContent = current === player ? "You Win 😎" : "AI Wins 🤖";

    setTimeout(() => {
      restart(); // يبدأ جيم جديد تلقائي
    }, 1500); // بعد 1.5 ثانية
  } 
  else if (!board.includes("")) {
    status.textContent = "Draw 🤝";

    setTimeout(() => {
      restart();
    }, 1500);
  } 
  else {
    currentTurn = current === "X" ? "O" : "X";
    status.textContent = currentTurn === player ? "Your Turn" : "AI Turn";
  }
}

function aiMove() {
    // نحدد المستوى عشوائيًا
    const rand = Math.random();
    let level = rand < 0.33 ? "easy" : rand < 0.66 ? "medium" : "hard";

    let move;

    const emptyCells = board.map((v, i) => i).filter(i => board[i] === "");

    if(level === "easy") {
        // أي خانة فاضية عشوائية
        move = emptyCells[Math.floor(Math.random() * emptyCells.length)];
    } else if(level === "medium") {
        // نصف الوقت عشوائي، نصف الوقت Minimax
        if(Math.random() < 0.5){
            move = emptyCells[Math.floor(Math.random() * emptyCells.length)];
        } else {
            let bestScore = -Infinity;
            for(const i of emptyCells){
                board[i] = ai;
                const score = minimax(board, 0, false);
                board[i] = "";
                if(score > bestScore){
                    bestScore = score;
                    move = i;
                }
            }
        }
    } else {
        // صعب = Minimax كامل
        let bestScore = -Infinity;
        for(const i of emptyCells){
            board[i] = ai;
            const score = minimax(board, 0, false);
            board[i] = "";
            if(score > bestScore){
                bestScore = score;
                move = i;
            }
        }
    }

    makeMove(move, ai);
}
function minimax(boardState, depth, isMaximizing) {
    // تحقق من الفوز أو التعادل
    let winner = checkWinnerMinimax(boardState);
    if (winner !== null) {
        if (winner === ai) return 10 - depth;
        else if (winner === player) return depth - 10;
        else return 0; // تعادل
    }

    if (isMaximizing) {
        let bestScore = -Infinity;
        for (let i = 0; i < boardState.length; i++) {
            if (boardState[i] === "") {
                boardState[i] = ai;
                let score = minimax(boardState, depth + 1, false);
                boardState[i] = "";
                bestScore = Math.max(score, bestScore);
            }
        }
        return bestScore;
    } else {
        let bestScore = Infinity;
        for (let i = 0; i < boardState.length; i++) {
            if (boardState[i] === "") {
                boardState[i] = player;
                let score = minimax(boardState, depth + 1, true);
                boardState[i] = "";
                bestScore = Math.min(score, bestScore);
            }
        }
        return bestScore;
    }
}

// دالة للتحقق من الفائز بدون تغيير الـ DOM
function checkWinnerMinimax(b) {
    const winPatterns = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    for (let pattern of winPatterns) {
        if (b[pattern[0]] !== "" && b[pattern[0]] === b[pattern[1]] && b[pattern[1]] === b[pattern[2]]) {
            return b[pattern[0]];
        }
    }

    return b.includes("") ? null : "draw";
}
function aiMove() {
    let move;

    // لو الجولة الأولى كاملة فاضية، اختار مربع عشوائي
    if (board.every(cell => cell === "")) {
        let empty = board.map((v, i) => i);
        move = empty[Math.floor(Math.random() * empty.length)];
    } else {
        // غير كده، استخدم Minimax
        let bestScore = -Infinity;
        for (let i = 0; i < board.length; i++) {
            if (board[i] === "") {
                board[i] = ai;
                let score = minimax(board, 0, false);
                board[i] = "";
                if (score > bestScore) {
                    bestScore = score;
                    move = i;
                }
            }
        }
    }

    makeMove(move, ai);
}
function checkWinner() {
  return winPatterns.some(pattern => {
    return pattern.every(i => board[i] !== "" && board[i] === board[pattern[0]]);
  });
}

function restart() {
  board = ["","","","","","","","",""];
  cells.forEach(c => c.textContent = "");
  currentTurn = "X";

  status.textContent = currentTurn === player ? "Your Turn" : "AI Turn";

  if(currentTurn === ai){
    setTimeout(aiMove,500);
  }
}
function startGame(choice){
  player = choice;
  ai = choice === "X" ? "O" : "X";

  document.getElementById("choice").style.display = "none";
  document.getElementById("game").style.display = "block";

  status.textContent = currentTurn === player ? "Your Turn" : "AI Turn";

  if(currentTurn === ai){
    setTimeout(aiMove,500);
  }
}
