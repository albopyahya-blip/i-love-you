</head>
<body>
  <div class="container">

<audio controls autoplay loop id="music" src="sound/Albumaty.Com_mhmd_sayd_fy_ayny.mp3"hidden></audio>

<label class="switch">
  <input type="checkbox" id="themeSwitch">
  <span class="slider">
    <span class="star star_1"></span>
    <span class="star star_2"></span>
    <span class="star star_3"></span>
    <span class="cloud">☁️</span>
  </span>
</label>

<style>
/* Switch Container أصغر */
.switch {
  font-size: 15px;
  position: fixed;
  top: 20px;
  right: 20px;
  display: inline-block;
  width: 3.2em;   /* أصغر شوي */
  height: 1.8em;  /* أصغر شوي */
  border-radius: 30px;
  box-shadow: 0 0 8px rgba(0,0,0,0.1);
  z-index: 2000;
}

.switch input {
  opacity: 0;
  width: 0;
  height: 0;
}

.slider {
  position: absolute;
  cursor: pointer;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background-color: var(--bg-side);
  transition: 0.4s;
  border-radius: 30px;
  overflow: hidden;
}

.slider:before {
  position: absolute;
  content: "";
  height: 1em;       /* أصغر شوي */
  width: 1em;        /* أصغر شوي */
  border-radius: 50%;
  left: 0.4em;
  bottom: 0.4em;
  transition: 0.4s cubic-bezier(0.81, -0.04, 0.38, 1.5);
  background-color: var(--btn-main);
  box-shadow: inset 6px -3px 0px 0px #fff;
}

.switch input:checked + .slider {
  background-color: var(--accent);
}

.switch input:checked + .slider:before {
  transform: translateX(1.4em);  /* تحريك أقل بسبب صغر الحجم */
  box-shadow: inset 12px -3px 0px 12px #ffcf48;
}

/* النجوم */
.star {
  background-color: #fff;
  border-radius: 50%;
  position: absolute;
  width: 4px;   /* أصغر شوي */
  height: 4px;  /* أصغر شوي */
  transition: all 0.4s;
}

.star_1 { left: 2em; top: 0.4em; }
.star_2 { left: 1.8em; top: 1em; }
.star_3 { left: 2.4em; top: 0.7em; }

.switch input:checked ~ .slider .star {
  opacity: 0;
}

/* السحابة */
.cloud {
  width: 2.8em;   /* أصغر شوي */
  position: absolute;
  bottom: -1em;
  left: -0.9em;
  opacity: 0;
  transition: all 0.4s;
}

.switch input:checked ~ .slider .cloud {
  opacity: 1;
}
</style>

<script>
const themeSwitch = document.getElementById('themeSwitch');
const html = document.documentElement;

// الوضع الحالي
let darkMode = localStorage.getItem('theme') === 'light' ? false : true;
themeSwitch.checked = !darkMode;
html.setAttribute('data-theme', darkMode ? 'dark' : 'light');

themeSwitch.addEventListener('change', () => {
  darkMode = !themeSwitch.checked;
  html.setAttribute('data-theme', darkMode ? 'dark' : 'light');
  localStorage.setItem('theme', darkMode ? 'dark' : 'light');
});
</script>

</body>
</html>
