<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love Battery ❤️</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
  color: white;
  background: linear-gradient(135deg, #000000, #1a1a1a);
  overflow: hidden;
}

/* Title */
h1 {
  font-size: 26px;
  margin-bottom: 10px;
  letter-spacing: 1px;
}

/* Progress bar container */
.bar-container {
  width: 85%;
  max-width: 400px;
  height: 35px;
  border-radius: 30px;
  background: rgba(255,255,255,0.1);
  overflow: hidden;
  margin-top: 20px;
  box-shadow: inset 0 0 10px rgba(255,255,255,0.1);
}

/* Progress bar */
.bar {
  height: 100%;
  width: 0%;
  border-radius: 30px;
  background: linear-gradient(90deg, #ff004c, #ff66a3);
  box-shadow: 0 0 15px #ff4d88;
  transition: 0.4s ease;
}

/* Message text */
.message {
  margin-top: 20px;
  font-size: 100%;
  opacity: 0.9;
}

/* Button */
button {
  margin-top: 30px;
  padding: 14px 25px;
  border: none;
  border-radius: 30px;
  background: linear-gradient(90deg, #ff004c, #ff66a3);
  color: white;
  font-size: 16px;
  cursor: pointer;
  box-shadow: 0 0 15px #ff4d88;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
}

/* Final popup */
#final {
  display: none;
  margin-top: 30px;
  animation: pop 1s ease;
}

@keyframes pop {
  0% { transform: scale(0); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}

/* Hearts animation */
.heart {
  position: absolute;
  font-size: 20px;
  animation: float 5s linear infinite;
  opacity: 0.6;
}

@keyframes float {
  from { transform: translateY(100vh); }
  to { transform: translateY(-10vh); }
}
</style>
</head>

<body>

<h1 id="percent">Love Level: 0% </h1>

<div class="bar-container">
  <div class="bar" id="bar"></div>
</div>

<p class="message" id="msg">Click to see how much I love you</p>

<button onclick="increaseLove()">Tap ❤️</button>

<div id="final">
  <h2>You reached MAX LOVE</h2>
  <!-- <p>بس الحقيقة... أنا من الأول 100% 😏❤️</p> -->
</div>

<script>
let love = 0;

// English يظهر / العربي ترجمة ليك
const messages = [
  "I never planned to meet you…",
"It just happened quietly",
"At first you were just someone I knew",
"Nothing special or so I thought",
"But slowly something started to change",
"I found myself waiting for you",
"Not just to talk but just to feel you near",
"You became part of my day without me noticing",
"And somehow part of my peace",
"I tried to understand this feeling",
"But the more I thought, the deeper I fell",
"You weren’t just anyone anymore",
"You became someone I can’t imagine replacing",
"Someone I don’t want to lose",
"And then I realized",
"I didn’t just like you",
"I fell in love with you"
];

let currentIndex = 0;

// كل ضغطة تظهر الرسالة التالية
function updateMessage() {
  const msg = document.getElementById("msg");
  if (currentIndex < messages.length) {
    msg.innerText = messages[currentIndex];
    currentIndex++;
  }
}

function increaseLove() {
  if (love < 100) {
    love += Math.floor(Math.random() * 8) + 6;
    if (love > 100) love = 100;

    document.getElementById("bar").style.width = love + "%";
    document.getElementById("percent").innerText = "Love Level: " + love + "% ❤️";

    updateMessage();

    if (navigator.vibrate) navigator.vibrate(40);

  } else {
    document.getElementById("final").style.display = "block";
    explodeHearts();
  }
}

// قلوب تظهر عند 100%
function explodeHearts() {
  for (let i = 0; i < 25; i++) {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (Math.random() * 2 + 3) + "s";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 5000);
  }
}
</script>

</body>
</html>
