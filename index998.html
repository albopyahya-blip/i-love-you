<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>unlock_me</title>

<style>

body{
background:white;
color:black;
font-family:monospace;

display:flex;
justify-content:center;
align-items:center;

min-height:100vh;
margin:0;
text-align:center;
overflow:hidden;
}

/* container */

.container{
width:90%;
max-width:420px;
}

/* animations */

.hidden{
display:none;
}

.fade{
animation:fade 1s ease-in-out;
}

@keyframes fade{
from{opacity:0;}
to{opacity:1;}
}

#typing{
font-size:20px;
min-height:40px;
margin-bottom:30px;
letter-spacing:1px;
}

/* input */

input{
padding:12px;
font-size:16px;
background:white;
color:black;
border:2px solid rgb(213,46,46);
text-align:center;
width:100%;
border-radius:8px;
box-sizing:border-box;
}

/* button */

button{

--main-color: rgb(213, 46, 46);
--main-bg-color: rgba(213, 46, 46, 0.36);
--pattern-color: rgba(213, 46, 46, 0.073);

cursor:pointer;
text-transform:uppercase;
letter-spacing:0.2rem;

background:
radial-gradient(circle,var(--main-bg-color) 0%,rgba(0,0,0,0) 95%),
linear-gradient(var(--pattern-color) 1px,transparent 1px),
linear-gradient(to right,var(--pattern-color) 1px,transparent 1px);

background-size:cover,15px 15px,15px 15px;

border-image: radial-gradient(circle,var(--main-color) 0%,rgba(0,0,0,0) 100%)1;

border-width:1px 0 1px 0;

color:var(--main-color);

padding:12px 30px;
font-weight:700;
font-size:16px;

margin-top:20px;

transition:0.2s;
}

button:hover{
background-size:cover,10px 10px,10px 10px;
color:rgb(255,89,0);
}

/* hearts */

.heart{
font-size:42px;
cursor:pointer;
margin:10px;
transition:0.3s;
}

.heart:hover{
transform:scale(1.4);
}

#finalMessage{
font-size:26px;
margin-bottom:20px;
}

#signature{
margin-top:30px;
font-size:18px;
opacity:0.8;
}

/* floating hearts */

.float-heart{
position:absolute;
color:red;
animation:floatUp 5s linear infinite;
}

@keyframes floatUp{
from{
transform:translateY(100vh);
opacity:1;
}
to{
transform:translateY(-10vh);
opacity:0;
}
}

/* mobile */

@media (max-width:600px){

#typing{
font-size:16px;
}

#finalMessage{
font-size:22px;
}

.heart{
font-size:34px;
}

button{
font-size:14px;
padding:10px 24px;
}

}

</style>
</head>

<body>

<div class="container">

<div id="typing"></div>

<!-- Puzzle 1 -->

<div id="puzzle1" class="hidden fade">

<p>enter my nickname for you</p>

<input id="answer1" placeholder="type your answer">

<button onclick="checkAnswer1()">unlock</button>

</div>

<!-- Puzzle 2 -->

<div id="puzzle2" class="hidden fade">

<p>where was our first date?</p>

<input id="answer2" placeholder="type your answer">

<button onclick="checkAnswer2()">unlock</button>

</div>

<!-- Puzzle 3 -->

<div id="puzzle3" class="hidden fade">

<p>you already have it. find my heart.</p>

<span class="heart" onclick="wrong()">🖤</span>
<span class="heart" onclick="wrong()">🖤</span>
<span class="heart" onclick="correct()">❤️</span>
<span class="heart" onclick="wrong()">🖤</span>

</div>

<!-- Final -->

<div id="final" class="hidden fade">

<div id="finalMessage"></div>

<button onclick="accept()">accept</button>

<div id="signature"></div>

</div>

</div>

<script>

/* typing animation */

let typingElement=document.getElementById("typing")

let messages=[
"initializing...",
"loading memories...",
"accessing emotional archive...",
"access granted.",
"memory 1 unlocked."
]

let messageIndex=0
let charIndex=0

function type(){

if(charIndex<messages[messageIndex].length){

typingElement.innerHTML+=messages[messageIndex].charAt(charIndex)

charIndex++

setTimeout(type,40)

}else{

setTimeout(nextMessage,900)

}

}

function nextMessage(){

messageIndex++
charIndex=0
typingElement.innerHTML=""

if(messageIndex<messages.length){

type()

}else{

document.getElementById("puzzle1").classList.remove("hidden")

}

}

type()

/* answers */

function checkAnswer1(){

let answer=document.getElementById("answer1").value.toLowerCase().trim()

if(answer==="maloktyyy"){

typingElement.innerHTML="correct."

setTimeout(()=>{

document.getElementById("puzzle1").classList.add("hidden")
document.getElementById("puzzle2").classList.remove("hidden")

typingElement.innerHTML="memory 2 unlocked."

},900)

}else{

typingElement.innerHTML="incorrect. try again."

}

}

function checkAnswer2(){

let answer=document.getElementById("answer2").value.toLowerCase().trim()

if(answer==="amongst few"){

typingElement.innerHTML="memory confirmed."

setTimeout(()=>{

document.getElementById("puzzle2").classList.add("hidden")
document.getElementById("puzzle3").classList.remove("hidden")

typingElement.innerHTML="final access required."

},900)

}else{

typingElement.innerHTML="incorrect. try again."

}

}

function correct(){

document.getElementById("puzzle3").classList.add("hidden")

document.getElementById("final").classList.remove("hidden")

typingElement.innerHTML=""

document.getElementById("finalMessage").innerHTML=
"one final question...<br><br>will you be my valentine?"

}

function wrong(){

typingElement.innerHTML="not this one."

}

function accept(){

document.getElementById("finalMessage").innerHTML=
"i knew you'd say yes."

document.getElementById("signature").innerHTML=
"Aru ❤️ Kush<br>Valentine’s Day 2026"

startHearts()

}

function startHearts(){

setInterval(()=>{

let heart=document.createElement("div")

heart.className="float-heart"

heart.innerHTML="❤️"

heart.style.left=Math.random()*100+"vw"

heart.style.fontSize=(Math.random()*20+20)+"px"

document.body.appendChild(heart)

setTimeout(()=>{

heart.remove()

},5000)

},300)

}

</script>

</body>
</html>
