<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Happy Birthday/title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            background: black;
            overflow: hidden;
            font-family: Arial, sans-serif;
            color: white;

            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .button-with-icon {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  
  overflow: hidden;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border: 1px solid #0f988e;
  letter-spacing: 1px;
  padding: 0 12px;
  width: 120px;
  height: 40px;
  font-size: 14px;
  border-radius: 3px;
  cursor: pointer;

  background: #15ccbe;
  color: white;

  box-shadow:
    inset 0 30px 30px -15px rgba(255,255,255,0.1),
    inset 0 0 0 1px rgba(255,255,255,0.3),
    0 3px 0 #0f988e,
    0 3px 2px rgba(0,0,0,0.2),
    0 5px 10px rgba(0,0,0,0.1);

  transition: 150ms;
}

.button-with-icon .icon {
  margin-right: 8px;
  width: 24px;
  height: 24px;
  transition: 0.5s;
}

.button-with-icon:active {
  transform: translate(-50%, 3px);
}

.button-with-icon:hover .text {
  transform: translateX(60px);
}

.button-with-icon:hover .icon {
  transform: translateX(20px);
}

.text {
  transition: 0.5s;
}
        h1 {
            font-size: 40px;
            margin: 10px;
            animation: glow 1.5s infinite alternate;
        }

        p {
            font-size: 20px;
            margin: 5px;
        }

        @media (max-width: 600px) {
            h1 { font-size: 24px; }
            p { font-size: 14px; }
        }

        @keyframes glow {
            from { text-shadow: 0 0 10px pink; }
            to { text-shadow: 0 0 30px hotpink; }
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: -1;
        }

        .heart {
            position: absolute;
            color: pink;
            font-size: 20px;
            animation: float 5s linear infinite;
        }

        @keyframes float {
            0% { transform: translateY(100vh); opacity: 1; }
            100% { transform: translateY(-10vh); opacity: 0; }
        }

        .play-btn {
            position: fixed;
            bottom: 20px;
            padding: 10px 15px;
            background: hotpink;
            border: none;
            border-radius: 15px;
            color: white;
        }
    </style>
</head>

<body>

<h1>🎉 Happy Birthday My Love 🎉</h1>
<p>You are the most beautiful girl of my life ❤️</p>

<canvas id="fireworks"></canvas>

<audio id="music" loop>
    <source src="happy-birthday.mp3" type="audio/mpeg">
</audio>

<button class="button-with-icon" onclick="document.getElementById('music').play()">
  <svg
    class="icon"
    viewBox="0 0 48 48"
    xmlns="http://www.w3.org/2000/svg"
  >
    <path
      fill="#ffffff"
      d="M12 39c-.549 0-1.095-.15-1.578-.447A3.008 3.008 0 0 1 9 36V12c0-1.041.54-2.007 1.422-2.553a3.014 3.014 0 0 1 2.919-.132l24 12a3.003 3.003 0 0 1 0 5.37l-24 12c-.42.21-.885.315-1.341.315z"
    ></path>
  </svg>
  <span class="text">Play</span>
</button>

<script>
const canvas = document.getElementById("fireworks");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

let particles = [];

function createFirework(x, y) {
    for (let i = 0; i < 100; i++) {
        particles.push({
            x: x,
            y: y,
            radius: 2,
            color: `hsl(${Math.random() * 360}, 100%, 50%)`,
            speedX: (Math.random() - 0.5) * 6,
            speedY: (Math.random() - 0.5) * 6,
            life: 100
        });
    }
}

function animate() {
    ctx.fillStyle = "rgba(0,0,0,0.2)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    particles.forEach((p, index) => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
        ctx.fillStyle = p.color;
        ctx.fill();

        p.x += p.speedX;
        p.y += p.speedY;
        p.life--;

        if (p.life <= 0) {
            particles.splice(index, 1);
        }
    });

    requestAnimationFrame(animate);
}

canvas.addEventListener("click", (e) => {
    createFirework(e.clientX, e.clientY);
});

canvas.addEventListener("touchstart", (e) => {
    const touch = e.touches[0];
    createFirework(touch.clientX, touch.clientY);
});

setInterval(() => {
    createFirework(Math.random() * canvas.width, Math.random() * canvas.height / 2);
}, 800);

function createHeart() {
    const heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (Math.random() * 3 + 3) + "s";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 5000);
}

setInterval(createHeart, 300);

animate();
</script>

</body>
</html>
