<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="author" content="yahya walid">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>i love you</title>
    <link rel="stylesheet" href="css/ym200.css">

</head>
<body>
   
    <h2></h2>
    <!-- الصوره -->

    <div class="image1">

            <div class="stack">
                <div class="card">
                    <div class="image">
                        <img src="img/yama1.jpeg" alt="">
                    </div>
                </div>
            </div>

    </div>

    <!-- الاغنيه -->

    <div>
  <!-- Audio -->
  <audio id="bg-music" loop>
    <source src="sound/Albumaty.Com_mhmd_sayd_fy_ayny.mp3" type="audio/mpeg">
  </audio>

  <!-- Button -->
  <button id="music-btn"></button>

  <!-- Toggle Switch -->
  <input type="checkbox" id="checkboxInput" style="display:none;">
  <label for="checkboxInput" class="toggleSwitch">
    <div class="speaker">
      <svg xmlns="http://www.w3.org/2000/svg" version="1.0" viewBox="0 0 75 75">
        <path d="M39.389,13.769 L22.235,28.606 L6,28.606 L6,47.699 L21.989,47.699 L39.389,62.75 L39.389,13.769z" 
              style="stroke:#fff;stroke-width:5;stroke-linejoin:round;fill:#fff;"></path>
        <path d="M48,27.6a19.5,19.5 0 0 1 0,21.4M55.1,20.5a30,30 0 0 1 0,35.6M61.6,14a38.8,38.8 0 0 1 0,48.6" 
              style="fill:none;stroke:#fff;stroke-width:5;stroke-linecap:round"></path>
      </svg>
    </div>
    <div class="mute-speaker">
      <svg version="1.0" viewBox="0 0 75 75" stroke="#fff" stroke-width="5">
        <path d="m39,14-17,15H6V48H22l17,15z" fill="#fff" stroke-linejoin="round"></path>
        <path d="m49,26 20,24m0-24-20,24" fill="#fff" stroke-linecap="round"></path>
      </svg>
    </div>
  </label>
</div>

<script>
const audio = document.getElementById('bg-music');
const btn = document.getElementById('music-btn');
const toggle = document.getElementById('checkboxInput');

// دالة لتحديث حالة الصوت والنص والأيقونة
function updateAudioState(isPlaying) {
  if(isPlaying) {
    audio.muted = false;
    audio.play();
    btn.textContent = "⏸️";   // pause
    toggle.checked = true;    // Toggle على تشغيل
  } else {
    audio.pause();
    btn.textContent = "🔊";   // play
    toggle.checked = false;   // Toggle على إيقاف
  }
}

// الزرار يبدل حالة الأغنية
btn.addEventListener('click', () => {
  updateAudioState(audio.paused);
});

// التوجل يبدل حالة الأغنية
toggle.addEventListener('change', () => {
  updateAudioState(toggle.checked);
});
</script>



 <!-- زرار الهوم الثابت -->
  <button class="home-btn" onclick="window.location.href='index.html'">H</button>

  

<label class="switch">
  <input type="checkbox" id="themeSwitch">
  <span class="slider">
    <span class="star star_1"></span>
    <span class="star star_2"></span>
    <span class="star star_3"></span>
    <span class="cloud">☁️</span>
  </span>
</label>

<style>
/* Switch Container أصغر */
.switch {
  font-size: 15px;
  position: fixed;
  top: 20px;
  right: 20px;
  display: inline-block;
  width: 3.2em;   /* أصغر شوي */
  height: 1.8em;  /* أصغر شوي */
  border-radius: 30px;
  box-shadow: 0 0 8px rgba(0,0,0,0.1);
  z-index: 2000;
}

.switch input {
  opacity: 0;
  width: 0;
  height: 0;
}

.slider {
  position: absolute;
  cursor: pointer;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background-color: var(--bg-side);
  transition: 0.4s;
  border-radius: 30px;
  overflow: hidden;
}

.slider:before {
  position: absolute;
  content: "";
  height: 1em;       /* أصغر شوي */
  width: 1em;        /* أصغر شوي */
  border-radius: 50%;
  left: 0.4em;
  bottom: 0.4em;
  transition: 0.4s cubic-bezier(0.81, -0.04, 0.38, 1.5);
  background-color: var(--btn-main);
  box-shadow: inset 6px -3px 0px 0px #fff;
}

.switch input:checked + .slider {
  background-color: var(--accent);
}

.switch input:checked + .slider:before {
  transform: translateX(1.4em);  /* تحريك أقل بسبب صغر الحجم */
  box-shadow: inset 12px -3px 0px 12px #ffcf48;
}

/* النجوم */
.star {
  background-color: #fff;
  border-radius: 50%;
  position: absolute;
  width: 4px;   /* أصغر شوي */
  height: 4px;  /* أصغر شوي */
  transition: all 0.4s;
}

.star_1 { left: 2em; top: 0.4em; }
.star_2 { left: 1.8em; top: 1em; }
.star_3 { left: 2.4em; top: 0.7em; }

.switch input:checked ~ .slider .star {
  opacity: 0;
}

/* السحابة */
.cloud {
  width: 2.8em;   /* أصغر شوي */
  position: absolute;
  bottom: -1em;
  left: -0.9em;
  opacity: 0;
  transition: all 0.4s;
}

.switch input:checked ~ .slider .cloud {
  opacity: 1;
}
</style>

<script>
const themeSwitch = document.getElementById('themeSwitch');
const html = document.documentElement;

// الوضع الحالي
let darkMode = localStorage.getItem('theme') === 'light' ? false : true;
themeSwitch.checked = !darkMode;
html.setAttribute('data-theme', darkMode ? 'dark' : 'light');

themeSwitch.addEventListener('change', () => {
  darkMode = !themeSwitch.checked;
  html.setAttribute('data-theme', darkMode ? 'dark' : 'light');
  localStorage.setItem('theme', darkMode ? 'dark' : 'light');
});
</script>

</body>
</html>
