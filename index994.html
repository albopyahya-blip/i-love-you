<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday ❤️</title>

<style>

/* الألوان */
:root {
  --bg-dark: #111111;
  --bg-side: #333333;
  --text-main: #eeeeee;
  --btn-main: #ff77bb;
  --btn-hover: #ff99cc;
  --accent: #70b5ff;
}

[data-theme="light"] {
  --bg-dark: #ffccd5;
  --bg-side: #ffffff;
  --text-main: #222222;
  --btn-main: #ff77bb;
  --btn-hover: #ff99cc;
  --accent: #4d94ff;
}

/* الصفحة */
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:var(--bg-dark);
  color:var(--text-main);
  font-family:Arial;
}

/* الحاوية */
.background-button {
  background: repeating-linear-gradient(
    45deg,
    #3c2209 0 20px,
    #ff9c00 20px 40px
  );
  width:150px;
  height:150px;
  position:relative;
  display:flex;
  justify-content:center;
  align-items:center;
  outline:2px solid black;
  border-radius:20px;
}

/* الزرار */
.button {
  background:#cc2a1f;
  width:70%;
  height:70%;
  border-radius:50%;
  color:white;
  font-size:1rem;
  font-weight:bold;
  font-family:'Courier New', Courier, monospace;
  border:2px solid black;
  cursor:pointer;

  /* تأثير الزرار */
  box-shadow: 0 10px 0 #842a2a;
  transition: all .2s ease;
}

/* تأثير الضغط */
.button:active {
  box-shadow: 0 2px 0 #842a2a;
  transform: translateY(6px);
}

/* موبايل */
@media (max-width:600px){
  .background-button{
    width:120px;
    height:120px;
  }

  .button{
    font-size:0.9rem;
  }
}

/* زرار تغيير الثيم */
.switch {
  font-size:15px;
  position:fixed;
  top:20px;
  right:20px;
  width:3.2em;
  height:1.8em;
  border-radius:30px;
  z-index:2000;
}

.switch input {
  opacity:0;
}

.slider {
  position:absolute;
  cursor:pointer;
  inset:0;
  background:var(--bg-side);
  transition:0.4s;
  border-radius:30px;
}

.slider:before {
  content:"";
  position:absolute;
  height:1em;
  width:1em;
  border-radius:50%;
  left:0.4em;
  bottom:0.4em;
  background:var(--btn-main);
  transition:0.4s;
}

.switch input:checked + .slider {
  background:var(--accent);
}

.switch input:checked + .slider:before {
  transform:translateX(1.4em);
}

</style>
</head>

<body>

<div class="background-button">
  <button class="button" onclick="window.location.href='index400.html'"></button>
</div>

<label class="switch">
  <input type="checkbox" id="themeSwitch">
  <span class="slider"></span>
</label>

<script>
const themeSwitch = document.getElementById('themeSwitch');
const html = document.documentElement;

let darkMode = localStorage.getItem('theme') === 'light' ? false : true;

themeSwitch.checked = !darkMode;
html.setAttribute('data-theme', darkMode ? 'dark' : 'light');

themeSwitch.addEventListener('change', () => {
  darkMode = !themeSwitch.checked;
  html.setAttribute('data-theme', darkMode ? 'dark' : 'light');
  localStorage.setItem('theme', darkMode ? 'dark' : 'light');
});
</script>

</body>
</html>
