<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday</title>

<style>

body{
  background:white;
  color:black;
  font-family:monospace;

  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;

  min-height:100vh;
  margin:0;
  text-align:center;
}

/* typing */
#typing{
  font-size:22px;
  letter-spacing:1px;
}

</style>
</head>

<body>

<div id="typing"></div>

<script>

/* typing animation */

let typingElement = document.getElementById("typing")

let messages = [
  "1 year...",
  "12 months...",
  "365 days...",
  "8760 hours...",
  "525600 minutes...",
  "31536000 seconds...",
  "Every day...",
  "Every night...",
  "Every time...",
  "I love you"
]

let messageIndex = 0
let charIndex = 0

function type(){
  if(charIndex < messages[messageIndex].length){
    typingElement.innerHTML += messages[messageIndex].charAt(charIndex)
    charIndex++
    setTimeout(type, 40)
  }else{
    setTimeout(nextMessage, 900)
  }
}

function nextMessage(){
  messageIndex++
  charIndex = 0
  typingElement.innerHTML = ""

  if(messageIndex < messages.length){
    type()
  }else{
    typingElement.innerHTML = "i wake up i think of you i go to sleep i dream of you"
  }
}

type()

</script>

</body>
</html>
